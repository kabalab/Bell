<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHHS Smart Schedule</title>

<style>
:root{
--bg1:#0a1a3a;
--bg2:#112c66;
--accent:#4c7dff;
--text:#e6eeff;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* subtle animated particles */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,0.05)2px,transparent 3px),
radial-gradient(circle at 70% 60%,rgba(255,255,255,0.04)2px,transparent 3px),
radial-gradient(circle at 40% 80%,rgba(255,255,255,0.03)2px,transparent 3px);
background-size:220px 220px;
animation:float 70s linear infinite;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-220px);}
}

.container{
position:relative;
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:22px;
backdrop-filter:blur(20px);
width:95%;
max-width:650px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

h1{
font-size:3em;
margin:0;
text-shadow:0 0 20px rgba(76,125,255,0.6);
}

h2{
font-weight:400;
opacity:0.85;
margin-top:8px;
}

#countdown{
margin-top:8px;
font-size:0.95em;
opacity:0.8;
}

button{
margin:15px 8px 0 8px;
padding:12px 20px;
border-radius:30px;
border:none;
cursor:pointer;
background:var(--accent);
color:white;
font-size:0.95em;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 18px rgba(76,125,255,0.7);
}

.panel{
margin-top:20px;
max-height:0;
overflow:hidden;
transition:max-height 0.6s ease,opacity 0.4s ease;
opacity:0;
background:rgba(0,0,0,0.25);
border-radius:12px;
padding:0 15px;
}

.panel.show{
max-height:450px;
opacity:1;
padding:15px;
}

.schedule-item{
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.active{
color:#8fb3ff;
font-weight:bold;
}

.holiday{
color:#ffcc66;
font-size:1.2em;
}
</style>
</head>

<body>

<div class="container">
<h1 id="currentPeriod">Loading...</h1>
<h2 id="endTime"></h2>
<div id="countdown"></div>

<button onclick="toggleToday()">Today's Schedule</button>
<button onclick="toggleAll()">All Schedules</button>

<div id="todayPanel" class="panel"></div>
<div id="allPanel" class="panel"></div>
</div>

<script>

/* Utility */

function formatDate(d){
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function nthWeekday(year,month,weekday,n){
let first=new Date(year,month,1);
let offset=(7+weekday-first.getDay())%7;
offset+=7*(n-1);
return new Date(year,month,1+offset);
}

function lastWeekday(year,month,weekday){
let last=new Date(year,month+1,0);
let offset=(7+last.getDay()-weekday)%7;
return new Date(year,month+1,0-offset);
}

/* Dynamic Holidays */

function getHolidays(){
let year=new Date().getFullYear();
let h={};

h[formatDate(nthWeekday(year,8,1,1))]="Labor Day";
h[formatDate(nthWeekday(year,0,1,3))]="Martin Luther King Jr. Day";
h[formatDate(nthWeekday(year,1,1,3))]="Presidents Day";
h[formatDate(lastWeekday(year,4,1))]="Memorial Day";
h[year+"-11-11"]="Veterans Day";

let thanksgiving=nthWeekday(year,10,4,4);
h[formatDate(thanksgiving)]="Thanksgiving";
let fri=new Date(thanksgiving);
fri.setDate(fri.getDate()+1);
h[formatDate(fri)]="Thanksgiving Break";

/* Winter Break */
for(let d=22;d<=31;d++){
h[year+"-12-"+String(d).padStart(2,"0")]="Winter Break";
}
for(let d=1;d<=2;d++){
h[(year+1)+"-01-"+String(d).padStart(2,"0")]="Winter Break";
}

return h;
}

const holidays=getHolidays();

/* Schedules */

const regular=[
["Period 1","08:45","09:42"],
["Period 2","09:48","10:45"],
["Period 3","10:51","11:48"],
["Period 4","11:54","12:51"],
["Lunch","12:57","13:27"],
["Period 5","13:33","14:30"],
["Period 6","14:36","15:33"]
];

const monday=[
["Period 1","09:20","10:10"],
["Period 2","10:16","11:06"],
["Period 3","11:12","12:02"],
["Period 4","12:08","12:58"],
["Lunch","13:04","13:34"],
["Period 5","13:40","14:39"],
["Period 6","14:45","15:35"]
];

function getTodaySchedule(){
let today=new Date();
let day=today.getDay();
if(day===1) return monday;
if(day>=2 && day<=5) return regular;
return null;
}

function update(){
let today=formatDate(new Date());

if(holidays[today]){
document.getElementById("currentPeriod").innerHTML=
"<span class='holiday'>"+holidays[today]+"</span>";
document.getElementById("endTime").innerText="No School Today";
document.getElementById("countdown").innerText="";
return;
}

let schedule=getTodaySchedule();
if(!schedule){
document.getElementById("currentPeriod").innerText="Weekend";
document.getElementById("endTime").innerText="";
document.getElementById("countdown").innerText="";
return;
}

let now=new Date();
let mins=now.getHours()*60+now.getMinutes();

for(let block of schedule){
let s=block[1].split(":");
let e=block[2].split(":");
let start=parseInt(s[0])*60+parseInt(s[1]);
let end=parseInt(e[0])*60+parseInt(e[1]);

if(mins>=start && mins<=end){
document.getElementById("currentPeriod").innerText=block[0];
document.getElementById("endTime").innerText="Ends at "+block[2];

let remaining=(end-mins)*60-now.getSeconds();
let min=Math.floor(remaining/60);
let sec=remaining%60;
document.getElementById("countdown").innerText=
"Time remaining: "+min+"m "+sec+"s";
return;
}
}

document.getElementById("currentPeriod").innerText="School is Out";
document.getElementById("endTime").innerText="";
document.getElementById("countdown").innerText="";
}

function toggleToday(){
let panel=document.getElementById("todayPanel");
panel.classList.toggle("show");
let schedule=getTodaySchedule();
if(!schedule){
panel.innerHTML="No school schedule today.";
return;
}
panel.innerHTML=schedule.map(p=>
"<div class='schedule-item'>"+p[0]+" : "+p[1]+" - "+p[2]+"</div>"
).join("");
}

function toggleAll(){
let panel=document.getElementById("allPanel");
panel.classList.toggle("show");
panel.innerHTML=
"<div class='schedule-item'>Regular Tue to Fri 8:45 to 3:33</div>"+
"<div class='schedule-item'>Monday Late Start 9:20 to 3:35</div>"+
"<div class='schedule-item'>Federal holidays auto detected yearly</div>";
}

update();
setInterval(update,1000);

</script>

</body>
</html>
