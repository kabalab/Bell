<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHHS Schedule</title>
  <style>
    :root{
      --bg1:#071327;
      --bg2:#0d214a;
      --bg3:#153571;
      --accent:#4c7dff;
      --text:#e6eeff;
      --warn:#ffcc66;
      --ok:#8fb3ff;
      --density:1;
    }

    *{box-sizing:border-box;}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;}
    body{
      font-family:'Segoe UI',sans-serif;color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(76,125,255,.16), transparent 60%),
        radial-gradient(1000px 700px at 85% 85%, rgba(143,179,255,.13), transparent 60%),
        linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
      display:flex;justify-content:center;align-items:center;position:relative;isolation:isolate;
      animation:skyBreath 18s ease-in-out infinite alternate;
    }

    .fx{position:fixed;inset:-35%;pointer-events:none;z-index:0;will-change:transform,opacity}
    .fx-orbs{
      background:
        radial-gradient(circle at 6% 14%, rgba(143,179,255,.11) 0 19px, transparent 46px),
        radial-gradient(circle at 17% 73%, rgba(255,255,255,.08) 0 14px, transparent 34px),
        radial-gradient(circle at 31% 42%, rgba(76,125,255,.09) 0 16px, transparent 38px),
        radial-gradient(circle at 44% 9%, rgba(255,255,255,.07) 0 13px, transparent 31px),
        radial-gradient(circle at 58% 66%, rgba(143,179,255,.1) 0 15px, transparent 36px),
        radial-gradient(circle at 69% 26%, rgba(255,255,255,.07) 0 12px, transparent 30px),
        radial-gradient(circle at 83% 84%, rgba(76,125,255,.09) 0 16px, transparent 37px),
        radial-gradient(circle at 95% 41%, rgba(255,255,255,.08) 0 14px, transparent 34px),
        radial-gradient(circle at 26% 86%, rgba(150,190,255,.08) 0 12px, transparent 30px),
        radial-gradient(circle at 75% 12%, rgba(255,255,255,.07) 0 11px, transparent 29px);
      filter:blur(1px);opacity:.62;animation:driftA 68s ease-in-out infinite alternate
    }
    .fx-specks{
      background:
        radial-gradient(circle at 4% 18%, rgba(255,255,255,.28) 0 1px, transparent 1.7px),
        radial-gradient(circle at 11% 57%, rgba(255,255,255,.2) 0 .9px, transparent 1.6px),
        radial-gradient(circle at 23% 33%, rgba(255,255,255,.25) 0 1px, transparent 1.7px),
        radial-gradient(circle at 29% 82%, rgba(200,225,255,.2) 0 .9px, transparent 1.6px),
        radial-gradient(circle at 37% 46%, rgba(255,255,255,.23) 0 1px, transparent 1.7px),
        radial-gradient(circle at 48% 12%, rgba(255,255,255,.18) 0 .8px, transparent 1.5px),
        radial-gradient(circle at 56% 71%, rgba(255,255,255,.26) 0 1px, transparent 1.7px),
        radial-gradient(circle at 63% 27%, rgba(180,210,255,.2) 0 .9px, transparent 1.6px),
        radial-gradient(circle at 74% 16%, rgba(255,255,255,.25) 0 1px, transparent 1.7px),
        radial-gradient(circle at 82% 63%, rgba(255,255,255,.2) 0 .9px, transparent 1.6px),
        radial-gradient(circle at 91% 35%, rgba(255,255,255,.24) 0 1px, transparent 1.7px),
        radial-gradient(circle at 96% 75%, rgba(220,235,255,.2) 0 .9px, transparent 1.6px);
      mix-blend-mode:screen;opacity:calc(.42 * var(--density));animation:driftB 44s linear infinite, twinkleA 4.6s ease-in-out infinite
    }
    .fx-mist{
      background:
        radial-gradient(ellipse at 12% 24%, rgba(255,255,255,.08), transparent 57%),
        radial-gradient(ellipse at 39% 81%, rgba(220,235,255,.07), transparent 58%),
        radial-gradient(ellipse at 72% 35%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(ellipse at 89% 78%, rgba(170,205,255,.05), transparent 57%);
      filter:blur(21px);opacity:.34;animation:driftC 82s ease-in-out infinite alternate
    }
    .fx-grid{
      background-image:
        linear-gradient(120deg, rgba(255,255,255,.06) 0 1px, transparent 1px 100%),
        linear-gradient(120deg, rgba(255,255,255,.04) 0 1px, transparent 1px 100%);
      background-size:150px 150px, 230px 230px;
      background-position:13px 17px, 86px 63px;
      opacity:.2;animation:driftD 58s ease-in-out infinite alternate-reverse
    }
    .fx-bokeh{
      background:
        radial-gradient(circle at 9% 77%, rgba(255,255,255,.1) 0 22px, transparent 50px),
        radial-gradient(circle at 27% 21%, rgba(143,179,255,.1) 0 18px, transparent 42px),
        radial-gradient(circle at 51% 63%, rgba(255,255,255,.08) 0 19px, transparent 45px),
        radial-gradient(circle at 68% 28%, rgba(170,205,255,.09) 0 16px, transparent 40px),
        radial-gradient(circle at 86% 73%, rgba(255,255,255,.08) 0 17px, transparent 42px);
      filter:blur(2px);opacity:.33;animation:driftE 72s ease-in-out infinite alternate-reverse
    }
    .fx-stars{
      background:
        radial-gradient(circle at 6% 33%, rgba(255,255,255,.34) 0 .9px, transparent 1.4px),
        radial-gradient(circle at 15% 91%, rgba(255,255,255,.24) 0 .8px, transparent 1.3px),
        radial-gradient(circle at 27% 22%, rgba(255,255,255,.3) 0 .9px, transparent 1.4px),
        radial-gradient(circle at 36% 69%, rgba(200,225,255,.22) 0 .8px, transparent 1.3px),
        radial-gradient(circle at 48% 14%, rgba(255,255,255,.28) 0 .9px, transparent 1.4px),
        radial-gradient(circle at 57% 82%, rgba(255,255,255,.23) 0 .8px, transparent 1.3px),
        radial-gradient(circle at 66% 38%, rgba(255,255,255,.28) 0 .9px, transparent 1.4px),
        radial-gradient(circle at 77% 11%, rgba(180,210,255,.22) 0 .8px, transparent 1.3px),
        radial-gradient(circle at 86% 58%, rgba(255,255,255,.29) 0 .9px, transparent 1.4px),
        radial-gradient(circle at 95% 26%, rgba(255,255,255,.22) 0 .8px, transparent 1.3px);
      opacity:calc(.3 * var(--density));animation:driftF 45s linear infinite
    }
    .fx-dust{
      background:
        radial-gradient(circle at 8% 25%, rgba(255,255,255,.2) 0 1.1px, transparent 1.9px),
        radial-gradient(circle at 21% 83%, rgba(255,255,255,.17) 0 1px, transparent 1.8px),
        radial-gradient(circle at 34% 57%, rgba(190,220,255,.17) 0 1px, transparent 1.8px),
        radial-gradient(circle at 49% 11%, rgba(255,255,255,.16) 0 .9px, transparent 1.7px),
        radial-gradient(circle at 62% 76%, rgba(170,205,255,.16) 0 1px, transparent 1.8px),
        radial-gradient(circle at 78% 34%, rgba(255,255,255,.16) 0 .9px, transparent 1.7px),
        radial-gradient(circle at 93% 89%, rgba(200,225,255,.16) 0 .9px, transparent 1.7px);
      opacity:calc(.31 * var(--density));animation:driftG 50s linear infinite, twinkleB 5.8s ease-in-out infinite
    }
    .fx-streaks{
      background:
        linear-gradient(116deg, rgba(255,255,255,.14) 0 1.2px, transparent 1.2px) 7% 16% / 14px 14px no-repeat,
        linear-gradient(116deg, rgba(190,220,255,.12) 0 1px, transparent 1px) 19% 73% / 12px 12px no-repeat,
        linear-gradient(116deg, rgba(255,255,255,.13) 0 1.1px, transparent 1.1px) 33% 44% / 13px 13px no-repeat,
        linear-gradient(116deg, rgba(170,205,255,.11) 0 1px, transparent 1px) 48% 85% / 11px 11px no-repeat,
        linear-gradient(116deg, rgba(255,255,255,.13) 0 1.1px, transparent 1.1px) 61% 24% / 13px 13px no-repeat,
        linear-gradient(116deg, rgba(190,220,255,.12) 0 1px, transparent 1px) 74% 58% / 11px 11px no-repeat,
        linear-gradient(116deg, rgba(255,255,255,.13) 0 1.1px, transparent 1.1px) 88% 13% / 12px 12px no-repeat,
        linear-gradient(116deg, rgba(170,205,255,.11) 0 1px, transparent 1px) 96% 67% / 11px 11px no-repeat;
      opacity:calc(.22 * var(--density));filter:blur(.2px);animation:driftH 60s ease-in-out infinite alternate
    }
    .fx-glints{
      background:
        radial-gradient(circle at 7% 52%, rgba(255,255,255,.62) 0 .8px, transparent 1.4px),
        radial-gradient(circle at 18% 22%, rgba(210,230,255,.52) 0 .7px, transparent 1.3px),
        radial-gradient(circle at 30% 74%, rgba(255,255,255,.58) 0 .8px, transparent 1.4px),
        radial-gradient(circle at 43% 35%, rgba(220,235,255,.50) 0 .7px, transparent 1.3px),
        radial-gradient(circle at 57% 86%, rgba(255,255,255,.56) 0 .8px, transparent 1.4px),
        radial-gradient(circle at 69% 19%, rgba(210,230,255,.50) 0 .7px, transparent 1.3px),
        radial-gradient(circle at 82% 61%, rgba(255,255,255,.56) 0 .8px, transparent 1.4px),
        radial-gradient(circle at 94% 29%, rgba(220,235,255,.50) 0 .7px, transparent 1.3px);
      mix-blend-mode:screen;opacity:calc(.3 * var(--density));animation:driftI 34s linear infinite, shimmer 2.8s ease-in-out infinite
    }
    .fx-aurora{
      background:
        radial-gradient(ellipse at 15% 40%, rgba(120,170,255,.14), transparent 52%),
        radial-gradient(ellipse at 65% 20%, rgba(200,130,255,.11), transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(90,220,200,.10), transparent 58%);
      filter:blur(28px);opacity:.45;animation:driftAurora 26s ease-in-out infinite alternate;
    }

    #shootingCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:.88}

    /* SOLID MAIN PANEL */
    .container{
      position:relative;
      z-index:2;
      background:#0f1f45;
      backdrop-filter:none;
      width:min(980px,96vw);
      max-height:94dvh;
      min-height:280px;
      overflow:hidden;
      padding:24px;
      border-radius:22px;
      box-shadow:0 20px 60px rgba(0,0,0,.6);
      transition:max-height .25s ease, height .25s ease;
    }

    .container.allow-scroll{overflow:auto;}
    body.bare-mode #topGrid{display:none !important;}
    body.bare-mode .container{width:auto;min-height:0;max-height:none;padding:0;border-radius:0;box-shadow:none;background:transparent;backdrop-filter:none;overflow:visible;}
    body.bare-mode #devPanel{margin:0;background:rgba(0,0,0,.28);backdrop-filter:blur(10px);}

    h1{margin:0;font-size:2.1em} h2{margin:8px 0 4px;font-weight:400;opacity:.9} #countdown{font-size:.95em;opacity:.9}
    #currentPeriod{transition:transform .2s ease,text-shadow .25s ease,opacity .2s ease;}
    .period-flash{animation:periodFlash .45s ease;}
    .top-grid{display:grid;grid-template-columns:1fr;gap:16px}
    .top-grid.calendar-visible{grid-template-columns:1.2fr 1fr}
    @media (max-width:860px){.top-grid.calendar-visible{grid-template-columns:1fr}}
    .actions{display:flex;flex-wrap:wrap;gap:2px}
    button{margin:2px 0 0;padding:9px 14px;border:none;border-radius:30px;cursor:pointer;background:var(--accent);color:#fff;font-size:.93em;transition:transform .12s ease,box-shadow .2s ease,filter .2s ease}
    button:hover{filter:brightness(1.08);transform:translateY(-1px)}
    button:active{transform:scale(0.97)}

    .panel{margin-top:14px;max-height:0;overflow:hidden;opacity:0;padding:0 14px;border-radius:12px;background:rgba(0,0,0,.35);transition:max-height .6s ease,opacity .35s ease,padding .25s ease}
    .panel.show{max-height:1300px;opacity:1;padding:14px}
    .schedule-item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.12)}
    .schedule-item:last-child{border-bottom:none}
    .holiday{color:var(--warn);font-size:1.16em}
    .badge{font-size:.76rem;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.18);margin-left:8px}
    .schedule-link{width:100%;text-align:left;margin:2px 0;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.16);transition:transform .18s ease, background .22s ease, box-shadow .22s ease}
    .schedule-link:hover{transform:translateY(-1px);background:rgba(255,255,255,.22)}
    .schedule-link.active-btn{background:rgba(76,125,255,.52);border:1px solid rgba(255,255,255,.45)}
    .schedule-link.click-animate{animation:scheduleButtonClick .42s ease}
    .inline-detail{margin:2px 0 10px 0;border-radius:10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);overflow:hidden;max-height:0;opacity:0;transform:translateY(-8px);transition:max-height .45s ease, opacity .35s ease, transform .35s ease, padding .35s ease;padding:0 12px}
    .inline-detail.show{max-height:700px;opacity:1;transform:translateY(0);padding:10px 12px}

    .calendar-card{background:rgba(0,0,0,.28);border-radius:14px;padding:12px}
    .calendar-card.hidden{display:none}
    .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .cal-nav{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:4px 8px;margin-left:4px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
    .cal-dow{text-align:center;font-size:.75rem;opacity:.8}
    .cal-day{border:none;border-radius:8px;min-height:38px;color:#fff;background:rgba(255,255,255,.12);cursor:pointer;font-size:.82rem}
    .cal-day.muted{opacity:.35;cursor:default;background:rgba(255,255,255,.06)}
    .cal-day.today{outline:2px solid #8fb3ff}
    .cal-day.selected{outline:2px solid #fff}
    .cal-day.filled-finals{background:rgba(255,111,111,.35)}
    .cal-day.filled-rally{background:rgba(102,169,255,.35)}
    .cal-day.filled-noschool{background:rgba(255,204,102,.4)}
    .cal-day.filled-multi{background:linear-gradient(135deg,rgba(255,111,111,.35),rgba(102,169,255,.32),rgba(255,204,102,.4))}
    .legend{margin-top:8px;font-size:.75rem;display:flex;gap:12px;flex-wrap:wrap}
    .legend-swatch{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:middle}
    #calendarInfo{margin-top:10px;font-size:.85rem;line-height:1.35}

    .dev-panel{margin-bottom:14px;border:1px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(0,0,0,.35);padding:10px 12px}
    .dev-title{font-size:.88rem;opacity:.95;margin-bottom:8px}
    .dev-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .dev-btn{background:rgba(143,179,255,.3);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:6px 10px;font-size:.8rem;color:#fff;cursor:pointer}
    .dev-btn.real{background:rgba(255,204,102,.26)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .dev-input,.dev-sec,.dev-num{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);color:#fff;border-radius:8px;padding:6px 8px;font-size:.82rem}
    .dev-sec{width:70px}
    .dev-num{width:88px}
    .dev-input::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}
    .theme-btn{border:1px solid rgba(255,255,255,.38);border-radius:999px;padding:6px 10px;font-size:.78rem;color:#fff;background:rgba(255,255,255,.16);cursor:pointer}
    .dev-info{margin-top:8px;padding:8px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:.78rem;line-height:1.35}
    .dev-info .k{opacity:.78}.dev-info .v{opacity:.98}

    @media (max-width:700px){
      .fx{inset:-42%}
      .container{width:100vw;max-height:100dvh;border-radius:0;padding:14px;box-shadow:none}
      .top-grid,.top-grid.calendar-visible{grid-template-columns:1fr !important;gap:12px}
      h1{font-size:1.55rem;line-height:1.2} h2{font-size:.98rem;margin-top:6px} #countdown{font-size:.92rem}
      .actions{gap:6px}.actions button{flex:1 1 100%;width:100%;font-size:.95rem;padding:10px 12px;border-radius:12px}
      .panel{margin-top:10px;border-radius:10px}.schedule-link{font-size:.92rem;border-radius:10px;padding:10px}
      .calendar-card{padding:10px;border-radius:12px}.cal-grid{gap:4px}
      .cal-day{min-height:34px;font-size:.78rem;border-radius:7px;padding:0}.cal-dow{font-size:.7rem}
      .legend{font-size:.7rem;gap:8px}.dev-panel{padding:10px;border-radius:10px}.dev-title{font-size:.82rem}
      .dev-row{gap:6px}.dev-btn{font-size:.76rem;padding:7px 9px}
      .dev-input,.dev-sec,.dev-num{width:100%;font-size:.86rem}
      .dev-row.custom-time-row{display:grid;grid-template-columns:1fr 90px;gap:6px}
      .dev-row.custom-time-row .dev-btn{grid-column:span 2;width:100%}
    }

    @keyframes periodFlash{0%{transform:scale(1);opacity:.85;text-shadow:0 0 0 rgba(143,179,255,0)}35%{transform:scale(1.04);opacity:1;text-shadow:0 0 14px rgba(143,179,255,.7)}100%{transform:scale(1);opacity:1;text-shadow:0 0 0 rgba(143,179,255,0)}}
    @keyframes scheduleButtonClick{0%{transform:scale(1);box-shadow:0 0 0 rgba(76,125,255,0)}35%{transform:scale(1.04);box-shadow:0 0 20px rgba(76,125,255,.55)}70%{transform:scale(.99);box-shadow:0 0 8px rgba(76,125,255,.28)}100%{transform:scale(1);box-shadow:0 0 0 rgba(76,125,255,0)}}
    @keyframes skyBreath{0%{filter:brightness(1)}100%{filter:brightness(1.06)}}
    @keyframes driftA{0%{transform:translate3d(0,0,0) rotate(0deg) scale(1)}25%{transform:translate3d(-26px,-16px,0) rotate(.24deg) scale(1.03)}50%{transform:translate3d(12px,-34px,0) rotate(-.2deg) scale(1.02)}75%{transform:translate3d(30px,-22px,0) rotate(.22deg) scale(1.04)}100%{transform:translate3d(-10px,-52px,0) rotate(-.12deg) scale(1.02)}}
    @keyframes driftB{from{transform:translate3d(0,0,0)}to{transform:translate3d(-58px,-78px,0)}}
    @keyframes twinkleA{0%,100%{opacity:.28}35%{opacity:.52}68%{opacity:.34}}
    @keyframes driftC{0%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(20px,-23px,0) scale(1.05)}100%{transform:translate3d(38px,-46px,0) scale(1.09)}}
    @keyframes driftD{0%{transform:translate3d(0,0,0) rotate(0deg)}100%{transform:translate3d(-30px,-45px,0) rotate(.3deg)}}
    @keyframes driftE{0%{transform:translate3d(0,0,0) scale(1)}100%{transform:translate3d(-26px,-40px,0) scale(1.05)}}
    @keyframes driftF{from{transform:translate3d(0,0,0)}to{transform:translate3d(-44px,-62px,0)}}
    @keyframes driftG{from{transform:translate3d(0,0,0)}to{transform:translate3d(-38px,-54px,0)}}
    @keyframes twinkleB{0%,100%{opacity:.2}50%{opacity:.42}}
    @keyframes driftH{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(-34px,-49px,0)}}
    @keyframes driftI{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(52px,-36px,0)}}
    @keyframes shimmer{0%,100%{opacity:.2}30%{opacity:.45}62%{opacity:.28}}
    @keyframes driftAurora{0%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(18px,-22px,0) scale(1.04)}100%{transform:translate3d(-16px,-38px,0) scale(1.08)}}

    @media (prefers-reduced-motion: reduce){
      body,.fx{animation:none !important}
      #shootingCanvas{display:none}
    }
  </style>
</head>
<body>
  <div class="fx fx-aurora"></div>
  <div class="fx fx-orbs"></div>
  <div class="fx fx-specks"></div>
  <div class="fx fx-mist"></div>
  <div class="fx fx-grid"></div>
  <div class="fx fx-bokeh"></div>
  <div class="fx fx-stars"></div>
  <div class="fx fx-dust"></div>
  <div class="fx fx-streaks"></div>
  <div class="fx fx-glints"></div>
  <canvas id="shootingCanvas"></canvas>

  <div class="container" id="mainContainer">
    <div class="dev-panel" id="devPanel">
      <div class="dev-title">Dev Tools</div>

      <div class="dev-row">
        <button class="dev-btn real" onclick="setTestNow(null)">Real Time</button>
        <button class="dev-btn" onclick="setTestNow('2026-03-02T10:00:00')">Mon During Class</button>
        <button class="dev-btn" onclick="setTestNow('2026-03-03T10:46:00')">Passing Period</button>
        <button class="dev-btn" onclick="setTestNow('2026-03-04T07:30:00')">Before School</button>
      </div>
      <div class="dev-row">
        <button class="dev-btn" onclick="setTestNow('2026-12-17T09:30:00')">Finals Day</button>
        <button class="dev-btn" onclick="setTestNow('2026-10-24T11:00:00')">Weekend</button>
      </div>

      <div class="dev-row custom-time-row" style="margin-top:8px;">
        <input id="devDateTimeInput" type="datetime-local" class="dev-input" step="1" />
        <input id="devSecondInput" type="number" min="0" max="59" value="0" class="dev-sec" title="Seconds" />
        <button class="dev-btn" onclick="applyCustomDevTime()">Set Time</button>
        <button class="dev-btn" onclick="startDevRun()">Start Run</button>
        <button class="dev-btn" onclick="pauseDevRun()">Pause</button>
      </div>

      <div class="dev-row" style="margin-top:8px;">
        <button class="theme-btn" onclick="setSimSpeed(1)">1x</button>
        <button class="theme-btn" onclick="setSimSpeed(5)">5x</button>
        <button class="theme-btn" onclick="setSimSpeed(10)">10x</button>
        <button class="theme-btn" onclick="setSimSpeed(30)">30x</button>
        <button class="theme-btn" onclick="setSimSpeed(60)">60x</button>
        <button class="theme-btn" onclick="setSimSpeed(120)">120x</button>
        <span class="mono" style="font-size:.8rem;opacity:.9;">Sim Speed: <strong id="simSpeedValue">1x</strong></span>
      </div>

      <div class="dev-row" style="margin-top:8px;">
        <span class="mono" style="font-size:.8rem;opacity:.9;">Cycle seconds (1x):</span>
        <input id="cycleSecondsInput" class="dev-num mono" type="number" min="5" max="3600" step="1" value="600" />
        <button class="theme-btn" onclick="applyCycleSeconds()">Apply</button>
        <span class="mono" style="font-size:.8rem;opacity:.9;">Effective: <strong id="effectiveCycleSeconds">600s</strong></span>
      </div>

      <div class="dev-row" id="themeRow" style="margin-top:8px; display:none;">
        <button class="theme-btn" onclick="applyTheme('blue')">Dark Blue</button>
        <button class="theme-btn" onclick="applyTheme('violet')">Violet</button>
        <button class="theme-btn" onclick="applyTheme('teal')">Teal</button>
        <button class="theme-btn" onclick="applyTheme('sunset')">Sunset</button>
        <button class="theme-btn" onclick="applyTheme('emerald')">Emerald</button>
        <button class="theme-btn" onclick="applyTheme('crimson')">Crimson</button>
        <button class="theme-btn" onclick="applyTheme('arctic')">Arctic</button>
        <button class="theme-btn" onclick="applyTheme('amber')">Amber</button>
        <button class="theme-btn" onclick="applyTheme('fuchsia')">Fuchsia</button>
        <button class="theme-btn" onclick="applyTheme('storm')">Storm</button>
        <button class="theme-btn" onclick="applyTheme('mint')">Mint</button>
        <button class="theme-btn" onclick="applyTheme('lava')">Lava</button>
        <button class="theme-btn" onclick="resetThemeShift()">Reset Cycle</button>
      </div>

      <div class="dev-info mono" id="devInfo">Loading diagnostics…</div>
    </div>

    <div class="top-grid" id="topGrid">
      <div>
        <h1 id="currentPeriod">Loading...</h1>
        <h2 id="endTime"></h2>
        <div id="countdown"></div>

        <div class="actions">
          <button onclick="toggleToday()">Today's Schedule</button>
          <button onclick="toggleAll()">All Schedules</button>
          <button onclick="toggleCalendar()" id="calendarToggleBtn">Show Calendar</button>
        </div>

        <div id="todayPanel" class="panel"></div>
        <div id="allPanel" class="panel"></div>
      </div>

      <div class="calendar-card hidden" id="calendarCard">
        <div class="cal-header">
          <div id="calTitle">Month YYYY</div>
          <div>
            <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
            <button class="cal-nav" onclick="goToCurrentMonth()">Today</button>
            <button class="cal-nav" onclick="changeMonth(1)">▶</button>
          </div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="legend">
          <span><span class="legend-swatch" style="background:rgba(255,111,111,.35)"></span>Finals</span>
          <span><span class="legend-swatch" style="background:rgba(102,169,255,.35)"></span>Pep Rally</span>
          <span><span class="legend-swatch" style="background:rgba(255,204,102,.40)"></span>No School</span>
        </div>
        <div id="calendarInfo"></div>
      </div>
    </div>
  </div>

  <script>
    let DEV_MODE=false, BARE_MODE=false, SIM_SPEED=1;
    let BASE_CYCLE_MS=600000;
    let currentThemeName="blue", currentTargetThemeName="violet";
    let activeShotsCount=0, shotsSpawnedLast60s=[], currentDensity=1;
    let reducedMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let TEST_NOW=null,devRunning=false,devAnchorRealMs=null,devAnchorSimMs=null;

    let colorCycleRAF=null, cycleFrom=null, cycleTo=null, cycleStart=0, cycleDurationMs=600000, cycleProgress=0;

    const cycleThemeKeys=["blue","violet","teal","sunset","emerald","crimson","arctic","amber","fuchsia","storm","mint","lava"];
    const themePresets={
      blue:{start:["#071327","#0d214a","#153571"]},
      violet:{start:["#1a153f","#2f266f","#4d3f96"]},
      teal:{start:["#0b1f2e","#12435b","#1b6f87"]},
      sunset:{start:["#2a1638","#4f2457","#7a3566"]},
      emerald:{start:["#0c2a21","#13503f","#1a7560"]},
      crimson:{start:["#2a0f1d","#4d1733","#77224c"]},
      arctic:{start:["#102338","#1a3f63","#275f88"]},
      amber:{start:["#2b1d10","#5b3a17","#8c5a22"]},
      fuchsia:{start:["#2a1030","#581b63","#8d2f92"]},
      storm:{start:["#121b2a","#24334b","#3a4f70"]},
      mint:{start:["#0f2a25","#1b5249","#2e7b70"]},
      lava:{start:["#2a110d","#5d2319","#913226"]}
    };

    const cssVar=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
    const setRootVar=(n,v)=>document.documentElement.style.setProperty(n,v);
    function parseHex(hex){const s=hex.replace("#","").trim();const f=s.length===3?s.split("").map(c=>c+c).join(""):s;const n=parseInt(f,16);return[(n>>16)&255,(n>>8)&255,n&255];}
    function toHex([r,g,b]){const h=v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0");return `#${h(r)}${h(g)}${h(b)}`;}
    function lerp(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
    function setBgTriplet(arr){setRootVar('--bg1',arr[0]);setRootVar('--bg2',arr[1]);setRootVar('--bg3',arr[2]);}
    function formatHMS(seconds){seconds=Math.max(0,Math.floor(seconds));const h=Math.floor(seconds/3600),m=Math.floor((seconds%3600)/60),s=seconds%60;return h>0?`${h}h ${m}m ${s}s`:`${m}m ${s}s`;}
    function pickRandomThemeExcept(exceptName){const pool=cycleThemeKeys.filter(k=>k!==exceptName);return pool[Math.floor(Math.random()*pool.length)];}

    function getNow(){
      if(!TEST_NOW) return new Date();
      if(devRunning && devAnchorRealMs!==null && devAnchorSimMs!==null){
        return new Date(devAnchorSimMs + (Date.now()-devAnchorRealMs)*SIM_SPEED);
      }
      return new Date(TEST_NOW);
    }

    function getEffectiveCycleMs(){ return BASE_CYCLE_MS / SIM_SPEED; }
    function stopCycle(){ if(colorCycleRAF) cancelAnimationFrame(colorCycleRAF); colorCycleRAF=null; }

    function startContinuousColorCycle(forceThemeName=null){
      stopCycle();
      if(forceThemeName && themePresets[forceThemeName]) currentThemeName=forceThemeName;

      cycleFrom=[parseHex(cssVar('--bg1')),parseHex(cssVar('--bg2')),parseHex(cssVar('--bg3'))];
      currentTargetThemeName=pickRandomThemeExcept(currentThemeName);
      const target=themePresets[currentTargetThemeName].start;
      cycleTo=[parseHex(target[0]),parseHex(target[1]),parseHex(target[2])];

      cycleStart=performance.now();
      cycleDurationMs=getEffectiveCycleMs();
      cycleProgress=0;

      const tick=(ts)=>{
        cycleProgress=Math.min(1,(ts-cycleStart)/cycleDurationMs);
        setBgTriplet([
          toHex(lerp(cycleFrom[0],cycleTo[0],cycleProgress)),
          toHex(lerp(cycleFrom[1],cycleTo[1],cycleProgress)),
          toHex(lerp(cycleFrom[2],cycleTo[2],cycleProgress))
        ]);

        if(cycleProgress<1){
          colorCycleRAF=requestAnimationFrame(tick);
          return;
        }

        currentThemeName=currentTargetThemeName;
        cycleFrom=cycleTo;
        currentTargetThemeName=pickRandomThemeExcept(currentThemeName);
        const t2=themePresets[currentTargetThemeName].start;
        cycleTo=[parseHex(t2[0]),parseHex(t2[1]),parseHex(t2[2])];

        cycleStart=performance.now();
        cycleDurationMs=getEffectiveCycleMs();
        cycleProgress=0;
        colorCycleRAF=requestAnimationFrame(tick);
      };

      colorCycleRAF=requestAnimationFrame(tick);
      updateDevInfo();
    }

    function applyTheme(name){
      const t=themePresets[name]; if(!t) return;
      currentThemeName=name;
      setBgTriplet(t.start);
      startContinuousColorCycle(name);
      updateDevInfo();
    }

    function resetThemeShift(){ applyTheme("blue"); }

    function setSimSpeed(mult){
      SIM_SPEED=Math.max(.1,Number(mult)||1);
      const el=document.getElementById("simSpeedValue"); if(el) el.textContent=`${SIM_SPEED}x`;

      if(devRunning && devAnchorRealMs!==null && devAnchorSimMs!==null){
        const nowSim=getNow(); devAnchorSimMs=nowSim.getTime(); devAnchorRealMs=Date.now();
      }

      const eff=document.getElementById("effectiveCycleSeconds");
      if(eff) eff.textContent=`${(getEffectiveCycleMs()/1000).toFixed(2)}s`;

      startContinuousColorCycle(currentThemeName);
      updateDevInfo();
    }

    function applyCycleSeconds(){
      const input=document.getElementById("cycleSecondsInput");
      if(!input) return;
      const v=Math.max(5,Math.min(3600,Number(input.value)||600));
      input.value=String(v);
      BASE_CYCLE_MS=v*1000;
      const eff=document.getElementById("effectiveCycleSeconds");
      if(eff) eff.textContent=`${(getEffectiveCycleMs()/1000).toFixed(2)}s`;
      startContinuousColorCycle(currentThemeName);
      updateDevInfo();
    }

    function nowLocalString(d){return d.toLocaleString(undefined,{hour12:false,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"});}
    function updateDevInfo(){
      const el=document.getElementById("devInfo"); if(!el||!DEV_MODE) return;
      const params=new URLSearchParams(location.search),cut=Date.now()-60000;
      shotsSpawnedLast60s=shotsSpawnedLast60s.filter(t=>t>=cut);
      const remainSec=((1-cycleProgress)*cycleDurationMs)/1000;

      el.innerHTML=`
        <div><span class="k">time:</span> <span class="v">${nowLocalString(getNow())}</span></div>
        <div><span class="k">params:</span> <span class="v">dev=${params.get("dev")||"0"} b=${params.get("b")||"0"}</span></div>
        <div><span class="k">sim speed:</span> <span class="v">${SIM_SPEED}x</span></div>
        <div><span class="k">cycle (base/effective):</span> <span class="v">${(BASE_CYCLE_MS/1000).toFixed(2)}s / ${(getEffectiveCycleMs()/1000).toFixed(2)}s</span></div>
        <div><span class="k">current → random next:</span> <span class="v">${currentThemeName} → ${currentTargetThemeName}</span></div>
        <div><span class="k">time to next full color:</span> <span class="v">${formatHMS(remainSec)}</span></div>
        <div><span class="k">bg:</span> <span class="v">${cssVar('--bg1')} | ${cssVar('--bg2')} | ${cssVar('--bg3')}</span></div>
        <div><span class="k">shooting:</span> <span class="v">active=${activeShotsCount} rate≈${shotsSpawnedLast60s.length}/min</span></div>
        <div><span class="k">screen:</span> <span class="v">${innerWidth}x${innerHeight} dpr=${Math.min(devicePixelRatio||1,2)}</span></div>
        <div><span class="k">density/reducedMotion:</span> <span class="v">${currentDensity} / ${reducedMotion}</span></div>`;
    }

    (function backgroundFX(){
      const root=document.documentElement;
      const mqReduce=window.matchMedia('(prefers-reduced-motion: reduce)');
      const canvas=document.getElementById('shootingCanvas');
      const ctx=canvas.getContext('2d');

      function updateDensity(){const w=innerWidth;let d=1;if(w<480)d=.6;else if(w<768)d=.78;else if(w<1200)d=.92;currentDensity=d;root.style.setProperty('--density',d);}
      let w=0,h=0,dpr=Math.min(devicePixelRatio||1,2),shots=[];

      function resizeCanvas(){w=innerWidth;h=innerHeight;dpr=Math.min(devicePixelRatio||1,2);canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}

      function spawnShot(){
        const x=Math.random()*w*.85 + w*.1;
        const y=Math.random()*h*.45;
        const s=4+Math.random()*6;
        const l=60+Math.random()*110;
        const a=(Math.PI*.75)+(Math.random()-.5)*.5;
        shots.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0,ttl:22+Math.random()*24,len:l,alpha:.32+Math.random()*.45});
        shotsSpawnedLast60s.push(Date.now());
      }

      function drawShot(s){
        const ex=s.x-s.vx*(s.len/10),ey=s.y-s.vy*(s.len/10);
        const g=ctx.createLinearGradient(s.x,s.y,ex,ey),a=s.alpha*(1-s.life/s.ttl);
        g.addColorStop(0,`rgba(255,255,255,${a})`);
        g.addColorStop(.5,`rgba(190,220,255,${a*.55})`);
        g.addColorStop(1,'rgba(180,210,255,0)');
        ctx.strokeStyle=g;ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(ex,ey);ctx.stroke();
      }

      const sparkles = Array.from({length:22},()=>({
        x:Math.random()*1,y:Math.random()*1,r:.7+Math.random()*1.5,a:.1+Math.random()*.25,p:Math.random()*Math.PI*2
      }));

      function drawSparkles(ts){
        const t=ts*0.001;
        for(const sp of sparkles){
          const x=(sp.x + Math.sin(t*0.03+sp.p)*0.02)*w;
          const y=(sp.y + Math.cos(t*0.02+sp.p)*0.02)*h;
          const alpha=sp.a + Math.sin(t*1.5+sp.p)*0.08;
          ctx.fillStyle=`rgba(230,240,255,${Math.max(0,alpha)})`;
          ctx.beginPath(); ctx.arc(x,y,sp.r,0,Math.PI*2); ctx.fill();
        }
      }

      function loop(ts){
        reducedMotion=mqReduce.matches;
        if(!mqReduce.matches){
          ctx.clearRect(0,0,w,h);
          const spawnChance = w<700 ? 0.0016 : 0.0026;
          if(Math.random()<spawnChance) spawnShot();
          for(let i=shots.length-1;i>=0;i--){
            const s=shots[i];
            s.x+=s.vx; s.y+=s.vy; s.life++;
            drawShot(s);
            if(s.life>=s.ttl||s.x<-140||s.y>h+140) shots.splice(i,1);
          }
          drawSparkles(ts);
        }
        activeShotsCount=shots.length;
        requestAnimationFrame(loop);
      }

      addEventListener('resize',()=>{resizeCanvas();updateDensity();updateDevInfo();});
      updateDensity();resizeCanvas();loop(0);
    })();

    function formatDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
    function parseTimeToMinutes(hhmm){const [h,m]=hhmm.split(":").map(Number);return h*60+m;}
    function toNormalTime(hhmm){const [h,m]=hhmm.split(":").map(Number);const ap=h>=12?"PM":"AM";let hr=h%12; if(hr===0) hr=12; return `${hr}:${String(m).padStart(2,"0")} ${ap}`;}
    function dateRange(s,e){const a=[];let d=new Date(s+"T00:00:00"),end=new Date(e+"T00:00:00");while(d<=end){a.push(formatDate(d));d.setDate(d.getDate()+1)}return a;}
    function prettyDate(s){return new Date(s+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
    function fullDate(s){return new Date(s+"T00:00:00").toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric",year:"numeric"});}
    function nthWeekday(year,month,weekday,n){const first=new Date(year,month,1);let off=(7+weekday-first.getDay())%7;off+=7*(n-1);return new Date(year,month,1+off);}
    function lastWeekday(year,month,weekday){const last=new Date(year,month+1,0);const off=(7+last.getDay()-weekday)%7;return new Date(year,month+1,0-off);}
    function getPeriodLabel(name){const m=name.match(/Period\\s+\\d+/i);return m?m[0]:name;}
    function formatDuration(totalSeconds){totalSeconds=Math.max(0,Math.floor(totalSeconds));const h=Math.floor(totalSeconds/3600),m=Math.floor((totalSeconds%3600)/60),s=totalSeconds%60;return h>0?`${h}h ${m}m ${s}s`:`${m}m ${s}s`;}

    let lastMainLabel="";
    function setMainLabel(nextLabel){const el=document.getElementById("currentPeriod");if(nextLabel!==lastMainLabel){el.classList.remove("period-flash");void el.offsetWidth;el.classList.add("period-flash");lastMainLabel=nextLabel;}el.innerHTML=nextLabel;}
    function toLocalInputValue(dateObj){const pad=n=>String(n).padStart(2,"0");return `${dateObj.getFullYear()}-${pad(dateObj.getMonth()+1)}-${pad(dateObj.getDate())}T${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}:${pad(dateObj.getSeconds())}`;}
    function setTestNow(iso){TEST_NOW=iso;devRunning=false;devAnchorRealMs=null;devAnchorSimMs=null;if(TEST_NOW){const d=new Date(TEST_NOW);document.getElementById("devDateTimeInput").value=toLocalInputValue(d);document.getElementById("devSecondInput").value=d.getSeconds();}update();if(calendarVisible)renderCalendar();fitContainer();updateDevInfo();}
    function applyCustomDevTime(){const input=document.getElementById("devDateTimeInput").value;if(!input)return;const secRaw=Number(document.getElementById("devSecondInput").value||0),sec=Math.max(0,Math.min(59,secRaw));let d=new Date(input);if(Number.isNaN(d.getTime()))return;d.setSeconds(sec,0);setTestNow(d.toISOString());}
    function startDevRun(){if(!TEST_NOW)setTestNow(new Date().toISOString());const sim=getNow();devRunning=true;devAnchorRealMs=Date.now();devAnchorSimMs=sim.getTime();updateDevInfo();}
    function pauseDevRun(){if(!TEST_NOW)return;if(devRunning)TEST_NOW=getNow().toISOString();devRunning=false;devAnchorRealMs=null;devAnchorSimMs=null;updateDevInfo();}

    const scheduleCatalog={
      regularTF:{title:"Daily Schedule (Tue–Fri)",blocks:[["Period 1","08:45","09:42"],["Period 2","09:48","10:45"],["Period 3","10:51","11:48"],["Period 4","11:54","12:51"],["Lunch","12:57","13:27"],["Period 5","13:33","14:30"],["Period 6","14:36","15:33"]]},
      mondayBroadcast:{title:"Monday Late Start (with PHHS Broadcast News)",blocks:[["Period 1","09:20","10:10"],["Period 2","10:16","11:06"],["Period 3","11:12","12:02"],["Period 4","12:08","12:58"],["Lunch","13:04","13:34"],["Period 5","13:40","14:39"],["Period 6","14:45","15:35"]]},
      mondayNoBroadcast:{title:"Monday Late Start (w/o Broadcast: first 3 Mondays)",blocks:[["Period 1","09:20","10:11"],["Period 2","10:17","11:08"],["Period 3","11:14","12:05"],["Period 4","12:11","13:02"],["Lunch","13:08","13:41"],["Period 5","13:47","14:38"],["Period 6","14:44","15:35"]]},
      pepRally:{title:"Pep Rally Schedule",blocks:[["Period 1","08:45","09:32"],["Period 2","09:38","10:25"],["Period 3","10:31","11:18"],["Rally","11:25","12:17"],["Period 4","12:24","13:11"],["Lunch","13:17","13:47"],["Period 5","13:53","14:40"],["Period 6","14:46","15:33"]]},
      finalsP12:{title:"Minimum Day Finals (P1 & P2)",blocks:[["Period 1 Final","08:45","10:45"],["Period 2 Final","11:11","13:11"]]},
      finalsP34:{title:"Minimum Day Finals (P3 & P4)",blocks:[["Period 3 Final","08:45","10:45"],["Period 4 Final","11:11","13:11"]]},
      finalsP56:{title:"Minimum Day Finals (P5 & P6)",blocks:[["Period 5 Final","08:45","10:45"],["Period 6 Final","11:11","13:11"]]}
    };

    const yearDataCache=new Map();
    function buildSchoolYearData(startYear){
      const y1=startYear,y2=startYear+1;
      const d={label:`${y1}-${y2}`,classesBegin:`${y1}-08-11`,classesEnd:`${y2}-05-28`,mondayNoBroadcast:new Set(),pepRallyDays:new Set(),finalsMap:{},noSchoolReasons:{}};
      let c=new Date(d.classesBegin+"T00:00:00"); while(c.getDay()!==1) c.setDate(c.getDate()+1);
      for(let i=0;i<3;i++){d.mondayNoBroadcast.add(formatDate(c));c.setDate(c.getDate()+7);}
      [nthWeekday(y1,9,5,4),lastWeekday(y2,0,5),nthWeekday(y2,3,5,4)].forEach(x=>d.pepRallyDays.add(formatDate(x)));
      d.finalsMap[`${y1}-12-17`]="finalsP12"; d.finalsMap[`${y1}-12-18`]="finalsP34"; d.finalsMap[`${y1}-12-19`]="finalsP56";
      d.finalsMap[`${y2}-05-26`]="finalsP12"; d.finalsMap[`${y2}-05-27`]="finalsP34"; d.finalsMap[`${y2}-05-28`]="finalsP56";
      d.noSchoolReasons[formatDate(nthWeekday(y1,8,1,1))]="Labor Day"; d.noSchoolReasons[`${y1}-10-13`]="Non-Instructional Day";
      d.noSchoolReasons[`${y1}-11-10`]="Non-Instructional Day"; d.noSchoolReasons[`${y1}-11-11`]="Veterans Day";
      const tg=nthWeekday(y1,10,4,4),m=new Date(tg),f=new Date(tg);m.setDate(tg.getDate()-3);f.setDate(tg.getDate()+1);
      dateRange(formatDate(m),formatDate(f)).forEach(x=>d.noSchoolReasons[x]="Thanksgiving Break");
      dateRange(`${y1}-12-22`,`${y2}-01-02`).forEach(x=>d.noSchoolReasons[x]="Winter Break");
      d.noSchoolReasons[formatDate(nthWeekday(y2,0,1,3))]="Martin Luther King Jr. Day";
      const p=nthWeekday(y2,1,1,3),fri=new Date(p); fri.setDate(p.getDate()-3);
      d.noSchoolReasons[formatDate(fri)]="Presidents Weekend"; d.noSchoolReasons[formatDate(p)]="Presidents Weekend";
      d.noSchoolReasons[`${y2}-03-09`]="Non-Instructional Day"; dateRange(`${y2}-03-30`,`${y2}-04-03`).forEach(x=>d.noSchoolReasons[x]="Spring Break");
      d.noSchoolReasons[formatDate(lastWeekday(y2,4,1))]="Memorial Day Observed"; return d;
    }
    function getSchoolYearData(startYear){if(!yearDataCache.has(startYear)) yearDataCache.set(startYear,buildSchoolYearData(startYear)); return yearDataCache.get(startYear);}
    function getYearDataByDate(ds){const year=Number(ds.slice(0,4));for(const s of [year-1,year]){const yData=getSchoolYearData(s);if(ds>=yData.classesBegin && ds<=yData.classesEnd) return yData;}return null;}
    function getScheduleKeyForDate(dateObj){
      const ds=formatDate(dateObj),y=getYearDataByDate(ds),day=dateObj.getDay();
      if(!y) return {type:"closed",reason:"No School (Outside School Year)",yearLabel:"Outside School Year"};
      if(day===0||day===6) return {type:"closed",reason:"Weekend",yearLabel:y.label};
      if(y.noSchoolReasons[ds]) return {type:"closed",reason:y.noSchoolReasons[ds],yearLabel:y.label};
      if(y.finalsMap[ds]) return {type:"schedule",key:y.finalsMap[ds],yearLabel:y.label};
      if(y.pepRallyDays.has(ds)) return {type:"schedule",key:"pepRally",yearLabel:y.label};
      if(day===1) return y.mondayNoBroadcast.has(ds)?{type:"schedule",key:"mondayNoBroadcast",yearLabel:y.label}:{type:"schedule",key:"mondayBroadcast",yearLabel:y.label};
      return {type:"schedule",key:"regularTF",yearLabel:y.label};
    }
    function getMarkersForDate(dateObj){
      const ds=formatDate(dateObj),y=getYearDataByDate(ds); if(!y) return ["noschool"];
      const marks=[]; if(y.finalsMap[ds]) marks.push("finals"); if(y.pepRallyDays.has(ds)) marks.push("rally");
      if(y.noSchoolReasons[ds]||dateObj.getDay()===0||dateObj.getDay()===6) marks.push("noschool"); return marks;
    }
    function markerClass(m){const f=m.includes("finals"),r=m.includes("rally"),n=m.includes("noschool"),c=[f,r,n].filter(Boolean).length;if(c>1) return "filled-multi"; if(f) return "filled-finals"; if(r) return "filled-rally"; if(n) return "filled-noschool"; return "";}
    function renderScheduleBlocks(s){return s.blocks.map(b=>`<div class="schedule-item"><strong>${b[0]}</strong> : ${toNormalTime(b[1])} - ${toNormalTime(b[2])}</div>`).join("");}
    function isWeekendNowOrAfterSchoolToWeekend(dateObj, info){
      const day = dateObj.getDay(); if (day === 0 || day === 6) return true;
      if (day === 5 && info.type === "schedule") {const sch = scheduleCatalog[info.key],lastBlock = sch.blocks[sch.blocks.length - 1],lastEndSec = parseTimeToMinutes(lastBlock[2]) * 60,nowSec = dateObj.getHours()*3600 + dateObj.getMinutes()*60 + dateObj.getSeconds(); if (nowSec >= lastEndSec) return true;}
      return false;
    }

    function update(){
      if (BARE_MODE) return;
      const now=getNow(),todayText=fullDate(formatDate(now));
      const info=getScheduleKeyForDate(now),end=document.getElementById("endTime"),cd=document.getElementById("countdown");
      if(info.type==="closed"){setMainLabel(`<span class="holiday">${info.reason}</span>`);end.innerText=todayText;cd.innerText="";return;}
      const sch=scheduleCatalog[info.key],nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds(),firstSec=parseTimeToMinutes(sch.blocks[0][1])*60;
      if(nowSec<firstSec){const firstLabel=getPeriodLabel(sch.blocks[0][0]);setMainLabel("Before School");end.innerText=`${firstLabel} starts at ${toNormalTime(sch.blocks[0][1])}`;cd.innerText=`Starts in: ${formatDuration(Math.max(0,firstSec-nowSec))}`;return;}
      for(let i=0;i<sch.blocks.length;i++){
        const [name,s,e]=sch.blocks[i],sm=parseTimeToMinutes(s)*60,em=parseTimeToMinutes(e)*60;
        if(nowSec>=sm && nowSec<em){setMainLabel(name);end.innerText=`Ends at ${toNormalTime(e)}`;cd.innerText=`Time remaining: ${formatDuration(Math.max(0,em-nowSec))}`;return;}
        if(i<sch.blocks.length-1){const next=sch.blocks[i+1],nm=parseTimeToMinutes(next[1])*60;if(nowSec>=em && nowSec<nm){setMainLabel("Passing Period");end.innerText=`${getPeriodLabel(next[0])} starts at ${toNormalTime(next[1])}`;cd.innerText=`Next class in: ${formatDuration(Math.max(0,nm-nowSec))}`;return;}}
      }
      if (isWeekendNowOrAfterSchoolToWeekend(now, info)) setMainLabel(`<span class="holiday">Weekend</span>`); else setMainLabel("School is Out");
      end.innerText=todayText; cd.innerText="";
    }

    function toggleToday(){const p=document.getElementById("todayPanel"); p.classList.toggle("show"); const now=getNow(),info=getScheduleKeyForDate(now),dateLabel=prettyDate(formatDate(now)); if(info.type==="closed"){p.innerHTML=`<div class="schedule-item"><strong>${dateLabel}</strong></div><div class="schedule-item">${info.reason}</div>`;fitContainer();return;} const sch=scheduleCatalog[info.key]; p.innerHTML=`<div class="schedule-item"><strong>${sch.title}</strong><span class="badge">${dateLabel}</span></div>`+renderScheduleBlocks(sch); fitContainer();}
    let activeScheduleKey=null;
    function renderAllSchedulesList(){const panel=document.getElementById("allPanel"),keys=Object.keys(scheduleCatalog);let html=`<div><strong>Click a schedule type:</strong></div>`;for(const key of keys){const sch=scheduleCatalog[key],active=activeScheduleKey===key;html+=`<button class="schedule-link ${active?'active-btn':''}" onclick="toggleInlineSchedule('${key}', event)">${sch.title}</button>`;html+=`<div class="inline-detail ${active?'show':''}">${active?renderScheduleBlocks(sch):""}</div>`;}panel.innerHTML=html;fitContainer();}
    function toggleInlineSchedule(key,ev){if(ev&&ev.currentTarget){const btn=ev.currentTarget;btn.classList.remove("click-animate");void btn.offsetWidth;btn.classList.add("click-animate");}activeScheduleKey=(activeScheduleKey===key)?null:key;renderAllSchedulesList();}
    function toggleAll(){const p=document.getElementById("allPanel");p.classList.toggle("show");if(p.classList.contains("show")) renderAllSchedulesList();fitContainer();}

    let calendarViewDate=new Date(),selectedDateStr=null,calendarVisible=false;
    function monthName(m){return new Date(2000,m,1).toLocaleString(undefined,{month:"long"});}
    function renderCalendar(){
      if (BARE_MODE) return;
      const grid=document.getElementById("calGrid"),title=document.getElementById("calTitle");
      const y=calendarViewDate.getFullYear(),m=calendarViewDate.getMonth();
      title.textContent=`${monthName(m)} ${y}`; grid.innerHTML="";
      ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{const e=document.createElement("div"); e.className="cal-dow"; e.textContent=d; grid.appendChild(e);});
      const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate(),today=formatDate(getNow());
      for(let i=0;i<firstDay;i++){const b=document.createElement("button");b.className="cal-day muted";b.disabled=true;grid.appendChild(b);}
      for(let day=1;day<=daysInMonth;day++){
        const d=new Date(y,m,day),ds=formatDate(d),marks=getMarkersForDate(d);
        const b=document.createElement("button");b.className="cal-day";b.textContent=day;
        const mc=markerClass(marks);if(mc) b.classList.add(mc); if(ds===today) b.classList.add("today"); if(ds===selectedDateStr) b.classList.add("selected");
        b.onclick=()=>{selectedDateStr=ds;renderCalendar();showCalendarInfo(ds);fitContainer();}; grid.appendChild(b);
      }
      if(selectedDateStr) showCalendarInfo(selectedDateStr); else document.getElementById("calendarInfo").innerHTML="";
      fitContainer();
    }

    function showCalendarInfo(ds){const el=document.getElementById("calendarInfo"),d=new Date(ds+"T00:00:00"),info=getScheduleKeyForDate(d);if(info.type==="closed"){el.innerHTML=`<strong>${prettyDate(ds)}</strong><br>${info.reason}<br><span style="opacity:.8">${info.yearLabel}</span>`;return;}const sch=scheduleCatalog[info.key],lines=sch.blocks.map(b=>`${b[0]} ${toNormalTime(b[1])}-${toNormalTime(b[2])}`).join("<br>");el.innerHTML=`<strong>${prettyDate(ds)}</strong><br>${sch.title}<br><span style="opacity:.88">${lines}</span><br><span style="opacity:.8">${info.yearLabel}</span>`;}
    function changeMonth(delta){calendarViewDate=new Date(calendarViewDate.getFullYear(),calendarViewDate.getMonth()+delta,1);selectedDateStr=null;renderCalendar();}
    function goToCurrentMonth(){const n=getNow();calendarViewDate=new Date(n.getFullYear(),n.getMonth(),1);selectedDateStr=null;renderCalendar();}
    function toggleCalendar(){if (BARE_MODE) return;calendarVisible=!calendarVisible;document.getElementById("calendarCard").classList.toggle("hidden",!calendarVisible);document.getElementById("topGrid").classList.toggle("calendar-visible",calendarVisible);document.getElementById("calendarToggleBtn").innerText=calendarVisible?"Hide Calendar":"Show Calendar";if(calendarVisible) renderCalendar();fitContainer();}

    function initModes(){
      const params=new URLSearchParams(location.search);
      DEV_MODE=params.get("dev")==="1"; BARE_MODE=params.get("b")==="1";
      if(BARE_MODE) document.body.classList.add("bare-mode");
    }
    function initDevPanelVisibility(){
      const devPanel=document.getElementById("devPanel"),themeRow=document.getElementById("themeRow");
      devPanel.style.display=DEV_MODE?"block":"none"; themeRow.style.display=DEV_MODE?"flex":"none";
      const input=document.getElementById("cycleSecondsInput"); if(input) input.value=String(BASE_CYCLE_MS/1000);
      const eff=document.getElementById("effectiveCycleSeconds"); if(eff) eff.textContent=`${(getEffectiveCycleMs()/1000).toFixed(2)}s`;
      fitContainer();
    }
    function fitContainer(){
      const c=document.getElementById("mainContainer");
      if(BARE_MODE){c.classList.remove("allow-scroll");c.style.maxHeight="none";return;}
      c.classList.remove("allow-scroll");
      const max=Math.floor(innerHeight*.94); c.style.maxHeight=`${max}px`;
      requestAnimationFrame(()=>{c.classList.toggle("allow-scroll", c.scrollHeight>c.clientHeight+1);});
    }

    initModes(); initDevPanelVisibility();
    applyTheme("blue");
    update(); fitContainer();
    addEventListener("resize", fitContainer);
    setInterval(()=>{update(); updateDevInfo();},250);
    renderCalendar(); updateDevInfo();
  </script>
</body>
</html>
