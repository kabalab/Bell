<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d214a" />
  <title>PHHS Schedule</title>
  <style>
    :root{
      --bg1:#071327;
      --bg2:#0d214a;
      --bg3:#153571;
      --accent:#4c7dff;
      --text:#e6eeff;
      --warn:#ffcc66;
      --ok:#8fb3ff;
      --density:1;
    }

    *{box-sizing:border-box;}
    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      touch-action:manipulation;
      -webkit-text-size-adjust:100%;
    }
    body{
      font-family:'Segoe UI',sans-serif;color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(76,125,255,.16), transparent 60%),
        radial-gradient(1000px 700px at 85% 85%, rgba(143,179,255,.13), transparent 60%),
        linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
      display:flex;justify-content:center;align-items:center;position:relative;isolation:isolate;
      animation:skyBreath 18s ease-in-out infinite alternate;
    }

    .container{
      position:relative;
      z-index:2;
      background:linear-gradient(145deg, color-mix(in oklab, var(--bg1) 78%, #0a0f1e 22%), color-mix(in oklab, var(--bg2) 80%, #0a0f1e 20%) 55%, color-mix(in oklab, var(--bg3) 82%, #0a0f1e 18%));
      backdrop-filter:none;
      width:min(980px,96vw);
      max-height:94dvh;
      min-height:280px;
      overflow:hidden;
      padding:24px;
      border-radius:22px;
      box-shadow:0 20px 60px rgba(0,0,0,.6);
      transition:max-height .25s ease, height .25s ease, background .35s linear;
    }

    .container.allow-scroll{overflow:auto;}
    body.bare-mode #topGrid{display:none !important;}
    body.bare-mode .container{width:auto;min-height:0;max-height:none;padding:0;border-radius:0;box-shadow:none;background:transparent;backdrop-filter:none;overflow:visible;}
    body.bare-mode #devPanel{margin:0;background:rgba(0,0,0,.28);backdrop-filter:blur(10px);}

    h1{margin:0;font-size:2.1em}
    h2{margin:8px 0 4px;font-weight:400;opacity:.9}
    #countdown{font-size:.95em;opacity:.9}
    #currentPeriod{transition:transform .2s ease,text-shadow .25s ease,opacity .2s ease;}
    .period-flash{animation:periodFlash .45s ease;}
    .top-grid{display:grid;grid-template-columns:1fr;gap:16px}
    .top-grid.calendar-visible{grid-template-columns:1.2fr 1fr}
    @media (max-width:860px){.top-grid.calendar-visible{grid-template-columns:1fr}}

    .actions{display:flex;flex-wrap:wrap;gap:2px}
    button{
      margin:2px 0 0;
      padding:9px 14px;
      border:none;
      border-radius:30px;
      cursor:pointer;
      background:var(--accent);
      color:#fff;
      font-size:.93em;
      transition:transform .12s ease,box-shadow .2s ease,filter .2s ease;
    }
    button:hover{filter:brightness(1.08);transform:translateY(-1px)}
    button:active{transform:scale(0.97)}

    .panel{
      margin-top:14px;
      max-height:0;
      overflow:hidden;
      opacity:0;
      padding:0 14px;
      border-radius:12px;
      background:rgba(0,0,0,.35);
      transition:max-height .6s ease,opacity .35s ease,padding .25s ease;
    }
    .panel.show{max-height:1300px;opacity:1;padding:14px}
    .schedule-item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.12)}
    .schedule-item:last-child{border-bottom:none}
    .holiday{color:var(--warn);font-size:1.16em}
    .badge{font-size:.76rem;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.18);margin-left:8px}

    .schedule-link{
      width:100%;
      text-align:left;
      margin:2px 0;
      padding:10px 12px;
      border-radius:10px;
      background:rgba(255,255,255,.16);
      transition:transform .18s ease, background .22s ease, box-shadow .22s ease;
    }
    .schedule-link:hover{transform:translateY(-1px);background:rgba(255,255,255,.22)}
    .schedule-link.active-btn{background:rgba(76,125,255,.52);border:1px solid rgba(255,255,255,.45)}
    .schedule-link.click-animate{animation:scheduleButtonClick .42s ease}

    .inline-detail{
      margin:2px 0 10px 0;
      border-radius:10px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.2);
      overflow:hidden;
      max-height:0;
      opacity:0;
      transform:translateY(-8px);
      transition:max-height .36s ease,opacity .26s ease,transform .26s ease,padding .22s ease;
      padding:0 12px;
    }
    .inline-detail.show{max-height:700px;opacity:1;transform:translateY(0);padding:10px 12px}

    .calendar-card{background:rgba(0,0,0,.28);border-radius:14px;padding:12px}
    .calendar-card.hidden{display:none}
    .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .cal-nav{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:4px 8px;margin-left:4px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
    .cal-dow{text-align:center;font-size:.75rem;opacity:.8}
    .cal-day{border:none;border-radius:8px;min-height:38px;color:#fff;background:rgba(255,255,255,.12);cursor:pointer;font-size:.82rem}
    .cal-day.muted{opacity:.35;cursor:default;background:rgba(255,255,255,.06)}
    .cal-day.today{outline:2px solid #8fb3ff}
    .cal-day.selected{outline:2px solid #fff}
    .cal-day.filled-finals{background:rgba(255,111,111,.35)}
    .cal-day.filled-rally{background:rgba(102,169,255,.35)}
    .cal-day.filled-noschool{background:rgba(255,204,102,.4)}
    .cal-day.filled-multi{background:linear-gradient(135deg,rgba(255,111,111,.35),rgba(102,169,255,.32),rgba(255,204,102,.4))}
    .legend{margin-top:8px;font-size:.75rem;display:flex;gap:12px;flex-wrap:wrap}
    .legend-swatch{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:middle}
    #calendarInfo{margin-top:10px;font-size:.85rem;line-height:1.35}

    .dev-panel{margin-bottom:14px;border:1px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(0,0,0,.35);padding:10px 12px}
    .dev-title{font-size:.88rem;opacity:.95;margin-bottom:8px}
    .dev-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .dev-btn{background:rgba(143,179,255,.3);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:6px 10px;font-size:.8rem;color:#fff;cursor:pointer}
    .dev-btn.real{background:rgba(255,204,102,.26)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .dev-input,.dev-sec,.dev-num{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);color:#fff;border-radius:8px;padding:6px 8px;font-size:.82rem}
    .dev-sec{width:70px}
    .dev-num{width:88px}
    .dev-input::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}
    .theme-btn{border:1px solid rgba(255,255,255,.38);border-radius:999px;padding:6px 10px;font-size:.78rem;color:#fff;background:rgba(255,255,255,.16);cursor:pointer}
    .dev-info{margin-top:8px;padding:8px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:.78rem;line-height:1.35}
    .dev-info .k{opacity:.78}
    .dev-info .v{opacity:.98}

    @media (max-width:700px){
      .container{
        width:100vw;
        max-height:100dvh;
        min-height:100dvh;
        border-radius:0;
        box-shadow:none;
        padding-top:12px;
        padding-left:max(12px, env(safe-area-inset-left));
        padding-right:max(12px, env(safe-area-inset-right));
        padding-bottom:max(16px, env(safe-area-inset-bottom));
      }

      .top-grid,
      .top-grid.calendar-visible{
        grid-template-columns:1fr !important;
        gap:10px;
      }

      h1{
        font-size:1.35rem;
        line-height:1.2;
        letter-spacing:.2px;
      }

      h2{
        font-size:.92rem;
        margin:6px 0 3px;
        opacity:.95;
      }

      #countdown{
        font-size:.9rem;
        opacity:.95;
      }

      .actions{
        display:grid;
        grid-template-columns:1fr;
        gap:8px;
        margin-top:8px;
      }

      .actions button{
        width:100%;
        margin:0;
        border-radius:12px;
        padding:11px 12px;
        font-size:.92rem;
        font-weight:600;
      }

      .panel{
        margin-top:8px;
        border-radius:10px;
      }

      .panel.show{
        padding:12px;
      }

      .schedule-item{
        font-size:.9rem;
        line-height:1.35;
        padding:7px 0;
      }

      .schedule-link{
        font-size:.9rem;
        border-radius:10px;
        padding:10px;
      }

      .inline-detail.show{
        padding:8px 10px;
      }

      .calendar-card{
        padding:10px;
        border-radius:12px;
      }

      .cal-header{
        margin-bottom:6px;
      }

      #calTitle{
        font-size:.95rem;
        font-weight:600;
      }

      .cal-nav{
        padding:6px 8px;
        border-radius:8px;
      }

      .cal-grid{
        gap:4px;
      }

      .cal-dow{
        font-size:.68rem;
      }

      .cal-day{
        min-height:44px;
        font-size:.76rem;
        border-radius:7px;
        padding:0;
      }

      .legend{
        font-size:.68rem;
        gap:7px;
      }

      #calendarInfo{
        margin-top:8px;
        font-size:.86rem;
        line-height:1.28;
      }

      .dev-panel{
        padding:9px;
        border-radius:10px;
        margin-bottom:10px;
      }

      .dev-title{
        font-size:.79rem;
        margin-bottom:6px;
      }

      .dev-row{
        gap:6px;
      }

      .dev-btn,
      .theme-btn{
        font-size:.74rem;
        padding:7px 9px;
        border-radius:999px;
        min-height:44px;
      }

      .dev-input,
      .dev-sec,
      .dev-num{
        width:100%;
        font-size:.84rem;
        min-height:44px;
      }

      .dev-row.custom-time-row{
        display:grid;
        grid-template-columns:1fr 88px;
        gap:6px;
      }

      .dev-row.custom-time-row .dev-btn{
        grid-column:span 2;
        width:100%;
      }

      .dev-info{
        font-size:.72rem;
        line-height:1.3;
        padding:7px 8px;
      }

      body{
        padding-bottom:env(safe-area-inset-bottom);
      }
    }

    @media (max-width:380px){
      h1{font-size:1.2rem;}
      h2,#countdown{font-size:.84rem;}
      .cal-day{font-size:.72rem;}
    }

    button,.cal-day,.schedule-link,.cal-nav{min-height:44px;}

    @keyframes periodFlash{
      0%{transform:scale(1);opacity:.85;text-shadow:0 0 0 rgba(143,179,255,0)}
      35%{transform:scale(1.04);opacity:1;text-shadow:0 0 14px rgba(143,179,255,.7)}
      100%{transform:scale(1);opacity:1;text-shadow:0 0 0 rgba(143,179,255,0)}
    }
    @keyframes scheduleButtonClick{
      0%{transform:scale(1);box-shadow:0 0 0 rgba(76,125,255,0)}
      35%{transform:scale(1.04);box-shadow:0 0 20px rgba(76,125,255,.55)}
      70%{transform:scale(.99);box-shadow:0 0 10px rgba(76,125,255,.28)}
      100%{transform:scale(1);box-shadow:0 0 0 rgba(76,125,255,0)}
    }
    @keyframes skyBreath{0%{filter:brightness(1)}100%{filter:brightness(1.06)}}

    @media (prefers-reduced-motion: reduce){
      body{animation:none !important}
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer">
    <div class="dev-panel" id="devPanel">
      <div class="dev-title">Dev Tools (random color cycle + diagnostics)</div>

      <div class="dev-row">
        <button class="dev-btn real" onclick="setTestNow(null)">Real Time</button>
        <button class="dev-btn" onclick="setTestNow('2026-03-02T10:00:00')">Mon During Class</button>
        <button class="dev-btn" onclick="setTestNow('2026-03-03T10:46:00')">Passing Period</button>
        <button class="dev-btn" onclick="setTestNow('2026-03-04T07:30:00')">Before School</button>
      </div>
      <div class="dev-row">
        <button class="dev-btn" onclick="setTestNow('2026-12-17T09:30:00')">Finals Day</button>
        <button class="dev-btn" onclick="setTestNow('2026-10-24T11:00:00')">Weekend</button>
      </div>

      <div class="dev-row custom-time-row" style="margin-top:8px;">
        <input id="devDateTimeInput" type="datetime-local" class="dev-input" step="1" />
        <input id="devSecondInput" type="number" min="0" max="59" value="0" class="dev-sec" title="Seconds" />
        <button class="dev-btn" onclick="CustomDevTime()">Set Time</button>
        <button class="dev-btn" onclick="startDevRun()">Start Run</button>
        <button class="dev-btn" onclick="pauseDevRun()">Pause</button>
      </div>

      <div class="dev-row" style="margin-top:8px;">
        <button class="theme-btn" onclick="setSimSpeed(1)">1x</button>
        <button class="theme-btn" onclick="setSimSpeed(5)">5x</button>
        <button class="theme-btn" onclick="setSimSpeed(10)">10x</button>
        <button class="theme-btn" onclick="setSimSpeed(30)">30x</button>
        <button class="theme-btn" onclick="setSimSpeed(60)">60x</button>
        <button class="theme-btn" onclick="setSimSpeed(120)">120x</button>
        <span class="mono" style="font-size:.8rem;opacity:.9;">Sim Speed: <strong id="simSpeedValue">1x</strong></span>
      </div>

      <div class="dev-row" style="margin-top:8px;">
        <span class="mono" style="font-size:.8rem;opacity:.9;">Cycle seconds (1x):</span>
        <input id="cycleSecondsInput" class="dev-num mono" type="number" min="5" max="3600" step="1" value="600" />
        <button class="theme-btn" onclick="applyCycleSeconds()">Apply</button>
        <span class="mono" style="font-size:.8rem;opacity:.9;">Effective: <strong id="effectiveCycleSeconds">600s</strong></span>
      </div>

      <div class="dev-row" id="themeRow" style="margin-top:8px; display:none;">
        <button class="theme-btn" onclick="applyTheme('blue')">Dark Blue</button>
        <button class="theme-btn" onclick="applyTheme('violet')">Violet</button>
        <button class="theme-btn" onclick="applyTheme('teal')">Teal</button>
        <button class="theme-btn" onclick="applyTheme('sunset')">Sunset</button>
        <button class="theme-btn" onclick="applyTheme('emerald')">Emerald</button>
        <button class="theme-btn" onclick="applyTheme('crimson')">Crimson</button>
        <button class="theme-btn" onclick="applyTheme('arctic')">Arctic</button>
        <button class="theme-btn" onclick="applyTheme('amber')">Amber</button>
        <button class="theme-btn" onclick="applyTheme('fuchsia')">Fuchsia</button>
        <button class="theme-btn" onclick="applyTheme('storm')">Storm</button>
        <button class="theme-btn" onclick="applyTheme('mint')">Mint</button>
        <button class="theme-btn" onclick="applyTheme('lava')">Lava</button>
        <button class="theme-btn" onclick="resetThemeShift()">Reset Cycle</button>
      </div>

      <div class="dev-info mono" id="devInfo">Loading diagnostics…</div>
    </div>

    <div class="top-grid" id="topGrid">
      <div>
        <h1 id="currentPeriod">Loading...</h1>
        <h2 id="endTime"></h2>
        <div id="countdown"></div>

        <div class="actions">
          <button onclick="toggleToday()">Today's Schedule</button>
          <button onclick="toggleAll()">All Schedules</button>
          <button onclick="toggleCalendar()" id="calendarToggleBtn">Show Calendar</button>
        </div>

        <div id="todayPanel" class="panel"></div>
        <div id="allPanel" class="panel"></div>
      </div>

      <div class="calendar-card hidden" id="calendarCard">
        <div class="cal-header">
          <div id="calTitle">Month YYYY</div>
          <div>
            <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
            <button class="cal-nav" onclick="goToCurrentMonth()">Today</button>
            <button class="cal-nav" onclick="changeMonth(1)">▶</button>
          </div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="legend">
          <span><span class="legend-swatch" style="background:rgba(255,111,111,.35)"></span>Finals</span>
          <span><span class="legend-swatch" style="background:rgba(102,169,255,.35)"></span>Pep Rally</span>
          <span><span class="legend-swatch" style="background:rgba(255,204,102,.40)"></span>No School</span>
        </div>
        <div id="calendarInfo"></div>
      </div>
    </div>
  </div>

  <script>
    let DEV_MODE=false, BARE_MODE=false, SIM_SPEED=1;
    let BASE_CYCLE_MS=600000;
    let currentThemeName="blue", currentTargetThemeName="violet";
    let currentDensity=1;
    let reducedMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let TEST_NOW=null,devRunning=false,devAnchorRealMs=null,devAnchorSimMs=null;
    window.__MOBILE_DPR_CAP__ = Math.min((window.devicePixelRatio || 1), window.matchMedia('(max-width:700px)').matches ? 1.5 : 2);

    let colorCycleRAF=null, cycleFrom=null, cycleTo=null, cycleStart=0, cycleDurationMs=600000, cycleProgress=0;

    const cycleThemeKeys=["blue","violet","teal","sunset","emerald","crimson","arctic","amber","fuchsia","storm","mint","lava"];
    const themePresets={
      blue:{start:["#071327","#0d214a","#153571"]},
      violet:{start:["#1a153f","#2f266f","#4d3f96"]},
      teal:{start:["#0b1f2e","#12435b","#1b6f87"]},
      sunset:{start:["#2a1638","#4f2457","#7a3566"]},
      emerald:{start:["#0c2a21","#13503f","#1a7560"]},
      crimson:{start:["#2a0f1d","#4d1733","#77224c"]},
      arctic:{start:["#102338","#1a3f63","#275f88"]},
      amber:{start:["#2b1d10","#5b3a17","#8c5a22"]},
      fuchsia:{start:["#2a1030","#581b63","#8d2f92"]},
      storm:{start:["#121b2a","#24334b","#3a4f70"]},
      mint:{start:["#0f2a25","#1b5249","#2e7b70"]},
      lava:{start:["#2a110d","#5d2319","#913226"]}
    };

    const cssVar=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
    const setRootVar=(n,v)=>document.documentElement.style.setProperty(n,v);
    function parseHex(hex){const s=hex.replace("#","").trim();const f=s.length===3?s.split("").map(c=>c+c).join(""):s;const n=parseInt(f,16);return[(n>>16)&255,(n>>8)&255,n&255];}
    function toHex([r,g,b]){const h=v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0");return `#${h(r)}${h(g)}${h(b)}`;}
    function lerp(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
    function setBgTriplet(arr){setRootVar('--bg1',arr[0]);setRootVar('--bg2',arr[1]);setRootVar('--bg3',arr[2]);}
    function formatHMS(seconds){seconds=Math.max(0,Math.floor(seconds));const h=Math.floor(seconds/3600),m=Math.floor((seconds%3600)/60),s=seconds%60;return h>0?`${h}h ${m}m ${s}s`:`${m}m ${s}s`;}
    function pickRandomThemeExcept(exceptName){const pool=cycleThemeKeys.filter(k=>k!==exceptName);return pool[Math.floor(Math.random()*pool.length)];}

    function getNow(){
      if(!TEST_NOW) return new Date();
      if(devRunning && devAnchorRealMs!==null && devAnchorSimMs!==null){
        return new Date(devAnchorSimMs + (Date.now()-devAnchorRealMs)*SIM_SPEED);
      }
      return new Date(TEST_NOW);
    }

    function getEffectiveCycleMs(){ return BASE_CYCLE_MS / SIM_SPEED; }
    function stopCycle(){ if(colorCycleRAF) cancelAnimationFrame(colorCycleRAF); colorCycleRAF=null; }

    function startContinuousColorCycle(forceThemeName=null){
      stopCycle();
      if(forceThemeName && themePresets[forceThemeName]) currentThemeName=forceThemeName;

      cycleFrom=[parseHex(cssVar('--bg1')),parseHex(cssVar('--bg2')),parseHex(cssVar('--bg3'))];
      currentTargetThemeName=pickRandomThemeExcept(currentThemeName);
      const target=themePresets[currentTargetThemeName].start;
      cycleTo=[parseHex(target[0]),parseHex(target[1]),parseHex(target[2])];

      cycleStart=performance.now();
      cycleDurationMs=getEffectiveCycleMs();
      cycleProgress=0;

      const tick=(ts)=>{
        cycleProgress=Math.min(1,(ts-cycleStart)/cycleDurationMs);
        setBgTriplet([
          toHex(lerp(cycleFrom[0],cycleTo[0],cycleProgress)),
          toHex(lerp(cycleFrom[1],cycleTo[1],cycleProgress)),
          toHex(lerp(cycleFrom[2],cycleTo[2],cycleProgress))
        ]);

        if(cycleProgress<1){
          colorCycleRAF=requestAnimationFrame(tick);
          return;
        }

        currentThemeName=currentTargetThemeName;
        cycleFrom=cycleTo;
        currentTargetThemeName=pickRandomThemeExcept(currentThemeName);
        const t2=themePresets[currentTargetThemeName].start;
        cycleTo=[parseHex(t2[0]),parseHex(t2[1]),parseHex(t2[2])];

        cycleStart=performance.now();
        cycleDurationMs=getEffectiveCycleMs();
        cycleProgress=0;
        colorCycleRAF=requestAnimationFrame(tick);
      };

      colorCycleRAF=requestAnimationFrame(tick);
      updateDevInfo();
    }

    function applyTheme(name){
      const t=themePresets[name]; if(!t) return;
      currentThemeName=name;
      setBgTriplet(t.start);
      startContinuousColorCycle(name);
      updateDevInfo();
    }

    function resetThemeShift(){ applyTheme("blue"); }

    function setSimSpeed(mult){
      SIM_SPEED=Math.max(.1,Number(mult)||1);
      const el=document.getElementById("simSpeedValue"); if(el) el.textContent=`${SIM_SPEED}x`;

      if(devRunning && devAnchorRealMs!==null && devAnchorSimMs!==null){
        const nowSim=getNow(); devAnchorSimMs=nowSim.getTime(); devAnchorRealMs=Date.now();
      }

      const eff=document.getElementById("effectiveCycleSeconds");
      if(eff) eff.textContent=`${(getEffectiveCycleMs()/1000).toFixed(2)}s`;

      startContinuousColorCycle(currentThemeName);
      updateDevInfo();
    }

    function applyCycleSeconds(){
      const input=document.getElementById("cycleSecondsInput");
      if(!input) return;
      const v=Math.max(5,Math.min(3600,Number(input.value)||600));
      input.value=String(v);
      BASE_CYCLE_MS=v*1000;
      const eff=document.getElementById("effectiveCycleSeconds");
      if(eff) eff.textContent=`${(getEffectiveCycleMs()/1000).toFixed(2)}s`;
      startContinuousColorCycle(currentThemeName);
      updateDevInfo();
    }

    function nowLocalString(d){return d.toLocaleString(undefined,{hour12:false,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"});}
    function updateDevInfo(){
      const el=document.getElementById("devInfo"); if(!el||!DEV_MODE) return;
      const params=new URLSearchParams(location.search);
      const remainSec=((1-cycleProgress)*cycleDurationMs)/1000;

      el.innerHTML=`
        <div><span class="k">time:</span> <span class="v">${nowLocalString(getNow())}</span></div>
        <div><span class="k">params:</span> <span class="v">dev=${params.get("dev")||"0"} b=${params.get("b")||"0"}</span></div>
        <div><span class="k">sim speed:</span> <span class="v">${SIM_SPEED}x</span></div>
        <div><span class="k">cycle (base/effective):</span> <span class="v">${(BASE_CYCLE_MS/1000).toFixed(2)}s / ${(getEffectiveCycleMs()/1000).toFixed(2)}s</span></div>
        <div><span class="k">current → random next:</span> <span class="v">${currentThemeName} → ${currentTargetThemeName}</span></div>
        <div><span class="k">time to next full color:</span> <span class="v">${formatHMS(remainSec)}</span></div>
        <div><span class="k">bg:</span> <span class="v">${cssVar('--bg1')} | ${cssVar('--bg2')} | ${cssVar('--bg3')}</span></div>
        <div><span class="k">screen:</span> <span class="v">${innerWidth}x${innerHeight} dpr=${Math.min(window.__MOBILE_DPR_CAP__ || (devicePixelRatio||1),2)}</span></div>
        <div><span class="k">density/reducedMotion:</span> <span class="v">${currentDensity} / ${reducedMotion}</span></div>`;
    }

    (function optimizeForMobilePerformance(){
      const isMobile = window.matchMedia('(max-width:700px)').matches;
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if(isMobile && !prefersReduced){
        BASE_CYCLE_MS = 900000;
        const cycleInput = document.getElementById("cycleSecondsInput");
        if(cycleInput) cycleInput.value = String(BASE_CYCLE_MS/1000);
      }
    })();

    function formatDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
    function parseTimeToMinutes(hhmm){const [h,m]=hhmm.split(":").map(Number);return h*60+m;}
    function toNormalTime(hhmm){const [h,m]=hhmm.split(":").map(Number);const ap=h>=12?"PM":"AM";let hr=h%12; if(hr===0) hr=12; return `${hr}:${String(m).padStart(2,"0")} ${ap}`;}
    function dateRange(s,e){const a=[];let d=new Date(s+"T00:00:00"),end=new Date(e+"T00:00:00");while(d<=end){a.push(formatDate(d));d.setDate(d.getDate()+1)}return a;}
    function prettyDate(s){return new Date(s+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
    function fullDate(s){return new Date(s+"T00:00:00").toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric",year:"numeric"});}
    function nthWeekday(year,month,weekday,n){const first=new Date(year,month,1);let off=(7+weekday-first.getDay())%7;off+=7*(n-1);return new Date(year,month,1+off);}
    function lastWeekday(year,month,weekday){const last=new Date(year,month+1,0);const off=(7+last.getDay()-weekday)%7;return new Date(year,month+1,0-off);}
    function getPeriodLabel(name){const m=name.match(/Period\s+\d+/i);return m?m[0]:name;}
    function formatDuration(totalSeconds){totalSeconds=Math.max(0,Math.floor(totalSeconds));const h=Math.floor(totalSeconds/3600),m=Math.floor((totalSeconds%3600)/60),s=totalSeconds%60;return h>0?`${h}h ${m}m ${s}s`:`${m}m ${s}s`;}

    let lastMainLabel="";
    function setMainLabel(nextLabel){
      const el=document.getElementById("currentPeriod");
      if(nextLabel!==lastMainLabel){
        el.classList.remove("period-flash");void el.offsetWidth;el.classList.add("period-flash");
      }
      el.innerHTML=nextLabel;
      lastMainLabel=nextLabel;
    }

    function toLocalInputValue(dateObj){
      const pad=n=>String(n).padStart(2,"0");
      return `${dateObj.getFullYear()}-${pad(dateObj.getMonth()+1)}-${pad(dateObj.getDate())}T${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}`;
    }

    function setTestNow(iso){
      TEST_NOW=iso;devRunning=false;devAnchorRealMs=null;devAnchorSimMs=null;
      if(TEST_NOW){
        const d=new Date(TEST_NOW);
        document.getElementById("devDateTimeInput").value=toLocalInputValue(d);
        document.getElementById("devSecondInput").value=String(d.getSeconds());
      }
      update();updateDevInfo();
    }

    function applyCustomDevTime(){
      const input=document.getElementById("devDateTimeInput").value;if(!input)return;
      const secRaw=Number(document.getElementById("devSecondInput").value||0),sec=Math.max(0,Math.min(59,Math.floor(secRaw)));
      const base=new Date(input);
      base.setSeconds(sec,0);
      setTestNow(base.toISOString());
    }

    function startDevRun(){
      if(!TEST_NOW)setTestNow(new Date().toISOString());
      const sim=getNow();devRunning=true;devAnchorRealMs=Date.now();devAnchorSimMs=sim.getTime();updateDevInfo();
    }

    function pauseDevRun(){
      if(!TEST_NOW)return;
      if(devRunning)TEST_NOW=getNow().toISOString();
      devRunning=false;devAnchorRealMs=null;devAnchorSimMs=null;updateDevInfo();
    }

    const scheduleCatalog={
      regularTF:{title:"Daily Schedule (Tue–Fri)",blocks:[["Period 1","08:45","09:42"],["Period 2","09:48","10:45"],["Period 3","10:51","11:48"],["Period 4","11:54","12:51"],["Lunch","12:57","13:27"],["Period 5","13:33","14:30"],["Period 6","14:36","15:33"]]},
      mondayBroadcast:{title:"Monday Late Start (with PHHS Broadcast News)",blocks:[["Period 1","09:20","10:10"],["Period 2","10:16","11:06"],["Period 3","11:12","12:02"],["Period 4","12:08","12:58"],["Lunch","13:04","13:34"],["Period 5","13:40","14:30"],["Period 6","14:36","15:26"]]},
      mondayNoBroadcast:{title:"Monday Late Start (w/o Broadcast: first 3 Mondays)",blocks:[["Period 1","09:20","10:11"],["Period 2","10:17","11:08"],["Period 3","11:14","12:05"],["Period 4","12:11","13:02"],["Lunch","13:08","13:38"],["Period 5","13:44","14:35"],["Period 6","14:41","15:32"]]},
      pepRally:{title:"Pep Rally Schedule",blocks:[["Period 1","08:45","09:32"],["Period 2","09:38","10:25"],["Period 3","10:31","11:18"],["Rally","11:25","12:17"],["Period 4","12:24","13:11"],["Lunch","13:17","13:47"],["Period 5","13:53","14:40"],["Period 6","14:46","15:33"]]},
      finalsP12:{title:"Minimum Day Finals (P1 & P2)",blocks:[["Period 1 Final","08:45","10:45"],["Period 2 Final","11:11","13:11"]]},
      finalsP34:{title:"Minimum Day Finals (P3 & P4)",blocks:[["Period 3 Final","08:45","10:45"],["Period 4 Final","11:11","13:11"]]},
      finalsP56:{title:"Minimum Day Finals (P5 & P6)",blocks:[["Period 5 Final","08:45","10:45"],["Period 6 Final","11:11","13:11"]]}
    };

    const yearDataCache=new Map();
    function buildSchoolYearData(startYear){
      const y1=startYear,y2=startYear+1;
      const d={label:`${y1}-${y2}`,classesBegin:`${y1}-08-11`,classesEnd:`${y2}-05-28`,mondayNoBroadcast:new Set(),pepRallyDays:new Set(),finalsMap:{},noSchoolReasons:{}};
      let c=new Date(d.classesBegin+"T00:00:00"); while(c.getDay()!==1) c.setDate(c.getDate()+1);
      for(let i=0;i<3;i++){d.mondayNoBroadcast.add(formatDate(c));c.setDate(c.getDate()+7);}
      [nthWeekday(y1,9,5,4),lastWeekday(y2,0,5),nthWeekday(y2,3,5,4)].forEach(x=>d.pepRallyDays.add(formatDate(x)));
      d.finalsMap[`${y1}-12-17`]="finalsP12"; d.finalsMap[`${y1}-12-18`]="finalsP34"; d.finalsMap[`${y1}-12-19`]="finalsP56";
      d.finalsMap[`${y2}-05-26`]="finalsP12"; d.finalsMap[`${y2}-05-27`]="finalsP34"; d.finalsMap[`${y2}-05-28`]="finalsP56";
      d.noSchoolReasons[formatDate(nthWeekday(y1,8,1,1))]="Labor Day"; d.noSchoolReasons[`${y1}-10-13`]="Non-Instructional Day";
      d.noSchoolReasons[`${y1}-11-10`]="Non-Instructional Day"; d.noSchoolReasons[`${y1}-11-11`]="Veterans Day";
      const tg=nthWeekday(y1,10,4,4),m=new Date(tg),f=new Date(tg);m.setDate(tg.getDate()-3);f.setDate(tg.getDate()+1);
      dateRange(formatDate(m),formatDate(f)).forEach(x=>d.noSchoolReasons[x]="Thanksgiving Break");
      dateRange(`${y1}-12-22`,`${y2}-01-02`).forEach(x=>d.noSchoolReasons[x]="Winter Break");
      d.noSchoolReasons[formatDate(nthWeekday(y2,0,1,3))]="Martin Luther King Jr. Day";
      const p=nthWeekday(y2,1,1,3),fri=new Date(p); fri.setDate(p.getDate()-3);
      d.noSchoolReasons[formatDate(fri)]="Presidents Weekend"; d.noSchoolReasons[formatDate(p)]="Presidents Weekend";
      d.noSchoolReasons[`${y2}-03-09`]="Non-Instructional Day"; dateRange(`${y2}-03-30`,`${y2}-04-03`).forEach(x=>d.noSchoolReasons[x]="Spring Break");
      d.noSchoolReasons[formatDate(lastWeekday(y2,4,1))]="Memorial Day Observed"; return d;
    }

    function getSchoolYearData(startYear){
      if(!yearDataCache.has(startYear)) yearDataCache.set(startYear,buildSchoolYearData(startYear));
      return yearDataCache.get(startYear);
    }

    function getYearDataByDate(ds){
      const year=Number(ds.slice(0,4));
      for(const s of [year-1,year]){
        const yData=getSchoolYearData(s);
        if(ds>=yData.classesBegin && ds<=yData.classesEnd) return yData;
      }
      return null;
    }

    function getScheduleKeyForDate(dateObj){
      const ds=formatDate(dateObj),y=getYearDataByDate(ds),day=dateObj.getDay();
      if(!y) return {type:"closed",reason:"No School (Outside School Year)",yearLabel:"Outside School Year"};
      if(day===0||day===6) return {type:"closed",reason:"Weekend",yearLabel:y.label};
      if(y.noSchoolReasons[ds]) return {type:"closed",reason:y.noSchoolReasons[ds],yearLabel:y.label};
      if(y.finalsMap[ds]) return {type:"schedule",key:y.finalsMap[ds],yearLabel:y.label};
      if(y.pepRallyDays.has(ds)) return {type:"schedule",key:"pepRally",yearLabel:y.label};
      if(day===1) return y.mondayNoBroadcast.has(ds)?{type:"schedule",key:"mondayNoBroadcast",yearLabel:y.label}:{type:"schedule",key:"mondayBroadcast",yearLabel:y.label};
      return {type:"schedule",key:"regularTF",yearLabel:y.label};
    }

    function getMarkersForDate(dateObj){
      const ds=formatDate(dateObj),y=getYearDataByDate(ds); if(!y) return ["noschool"];
      const marks=[]; if(y.finalsMap[ds]) marks.push("finals"); if(y.pepRallyDays.has(ds)) marks.push("rally");
      if(y.noSchoolReasons[ds]||dateObj.getDay()===0||dateObj.getDay()===6) marks.push("noschool"); return marks;
    }

    function markerClass(m){
      const f=m.includes("finals"),r=m.includes("rally"),n=m.includes("noschool"),c=[f,r,n].filter(Boolean).length;
      if(c>1) return "filled-multi"; if(f) return "filled-finals"; if(r) return "filled-rally"; if(n) return "filled-noschool"; return "";
    }

    function renderScheduleBlocks(s){
      return s.blocks.map(b=>`<div class="schedule-item"><strong>${b[0]}</strong> : ${toNormalTime(b[1])} - ${toNormalTime(b[2])}</div>`).join("");
    }

    function isWeekendNowOrAfterSchoolToWeekend(dateObj, info){
      const day = dateObj.getDay(); if (day === 0 || day === 6) return true;
      if (day === 5 && info.type === "schedule") {
        const sch = scheduleCatalog[info.key],lastBlock = sch.blocks[sch.blocks.length - 1],lastEndSec = parseTimeToMinutes(lastBlock[2]) * 60,nowSec = dateObj.getHours()*3600 + dateObj.getMinutes()*60 + dateObj.getSeconds();
        if (nowSec >= lastEndSec) return true;
      }
      return false;
    }

    function update(){
      if (BARE_MODE) return;
      const now=getNow(),todayText=fullDate(formatDate(now));
      const info=getScheduleKeyForDate(now),end=document.getElementById("endTime"),cd=document.getElementById("countdown");

      if(info.type==="closed"){
        setMainLabel(`<span class="holiday">${info.reason}</span>`);end.innerText=todayText;cd.innerText="";return;
      }

      const sch=scheduleCatalog[info.key],nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds(),firstSec=parseTimeToMinutes(sch.blocks[0][1])*60;
      if(nowSec<firstSec){
        const firstLabel=getPeriodLabel(sch.blocks[0][0]);
        setMainLabel("Before School");
        end.innerText=`${firstLabel} starts at ${toNormalTime(sch.blocks[0][1])}`;
        cd.innerText=`Starts in: ${formatDuration(firstSec-nowSec)}`;
        return;
      }

      for(let i=0;i<sch.blocks.length;i++){
        const [name,s,e]=sch.blocks[i],sm=parseTimeToMinutes(s)*60,em=parseTimeToMinutes(e)*60;
        if(nowSec>=sm && nowSec<em){
          setMainLabel(name);end.innerText=`Ends at ${toNormalTime(e)}`;cd.innerText=`Time remaining: ${formatDuration(Math.max(0,em-nowSec))}`;return;
        }
        if(i<sch.blocks.length-1){
          const next=sch.blocks[i+1],nm=parseTimeToMinutes(next[1])*60;
          if(nowSec>=em && nowSec<nm){
            setMainLabel("Passing Period");
            end.innerText=`${getPeriodLabel(next[0])} starts at ${toNormalTime(next[1])}`;
            cd.innerText=`Starts in: ${formatDuration(Math.max(0,nm-nowSec))}`;
            return;
          }
        }
      }

      if (isWeekendNowOrAfterSchoolToWeekend(now, info)) setMainLabel(`<span class="holiday">Weekend</span>`);
      else setMainLabel("School is Out");
      end.innerText=todayText; cd.innerText="";
    }

    function toggleToday(){
      const p=document.getElementById("todayPanel");
      p.classList.toggle("show");
      const now=getNow(),info=getScheduleKeyForDate(now),dateLabel=prettyDate(formatDate(now));

      if(info.type==="closed"){
        p.innerHTML=`<div class="schedule-item"><strong>${dateLabel}</strong><span class="badge">${info.yearLabel}</span></div><div class="schedule-item holiday">${info.reason}</div>`;
      }else{
        const s=scheduleCatalog[info.key];
        p.innerHTML=`<div class="schedule-item"><strong>${s.title}</strong><span class="badge">${info.yearLabel}</span></div>${renderScheduleBlocks(s)}`;
      }
      fitContainer();
    }

    let activeScheduleKey=null;
    function renderAllSchedulesList(){
      const panel=document.getElementById("allPanel"),keys=Object.keys(scheduleCatalog);
      let html=`<div><strong>Click a schedule type:</strong></div>`;
      for(const key of keys){
        const s=scheduleCatalog[key];
        html+=`
          <button class="schedule-link ${activeScheduleKey===key?'active-btn':''}" onclick="toggleInlineSchedule('${key}',event)">${s.title}</button>
          <div class="inline-detail ${activeScheduleKey===key?'show':''}" id="detail-${key}">
            ${renderScheduleBlocks(s)}
          </div>`;
      }
      panel.innerHTML=html;
    }

    function toggleInlineSchedule(key,ev){
      if(ev&&ev.currentTarget){
        const btn=ev.currentTarget;btn.classList.remove("click-animate");void btn.offsetWidth;btn.classList.add("click-animate");
      }
      activeScheduleKey=(activeScheduleKey===key)?null:key;
      renderAllSchedulesList();fitContainer();
    }

    function toggleAll(){
      const p=document.getElementById("allPanel");p.classList.toggle("show");
      if(p.classList.contains("show")) renderAllSchedulesList();
      fitContainer();
    }

    let calendarViewDate=new Date(),selectedDateStr=null,calendarVisible=false;
    function monthName(m){return new Date(2000,m,1).toLocaleString(undefined,{month:"long"});}

    function renderCalendar(){
      if (BARE_MODE) return;
      const grid=document.getElementById("calGrid"),title=document.getElementById("calTitle");
      const y=calendarViewDate.getFullYear(),m=calendarViewDate.getMonth();
      title.textContent=`${monthName(m)} ${y}`; grid.innerHTML="";
      ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{const e=document.createElement("div"); e.className="cal-dow"; e.textContent=d; grid.appendChild(e);});
      const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate(),today=formatDate(getNow());

      for(let i=0;i<firstDay;i++){const b=document.createElement("button");b.className="cal-day muted";b.disabled=true;grid.appendChild(b);}

      for(let day=1;day<=daysInMonth;day++){
        const d=new Date(y,m,day),ds=formatDate(d),marks=getMarkersForDate(d);
        const b=document.createElement("button");b.className="cal-day";b.textContent=day;
        const mc=markerClass(marks);if(mc) b.classList.add(mc); if(ds===today) b.classList.add("today"); if(ds===selectedDateStr) b.classList.add("selected");
        b.onclick=()=>{selectedDateStr=ds;renderCalendar();showCalendarInfo(ds);fitContainer();}; grid.appendChild(b);
      }

      if(selectedDateStr) showCalendarInfo(selectedDateStr); else document.getElementById("calendarInfo").innerHTML="";
      fitContainer();
    }

    function showCalendarInfo(ds){
      const el=document.getElementById("calendarInfo"),d=new Date(ds+"T00:00:00"),info=getScheduleKeyForDate(d);
      if(info.type==="closed"){
        el.innerHTML=`<strong>${prettyDate(ds)}</strong><br><span class="holiday">${info.reason}</span>`;
      }else{
        const s=scheduleCatalog[info.key];
        el.innerHTML=`<strong>${prettyDate(ds)}</strong><br>${s.title}`;
      }
    }

    function changeMonth(delta){calendarViewDate=new Date(calendarViewDate.getFullYear(),calendarViewDate.getMonth()+delta,1);selectedDateStr=null;renderCalendar();}
    function goToCurrentMonth(){const n=getNow();calendarViewDate=new Date(n.getFullYear(),n.getMonth(),1);selectedDateStr=null;renderCalendar();}
    function toggleCalendar(){
      if (BARE_MODE) return;
      calendarVisible=!calendarVisible;
      document.getElementById("calendarCard").classList.toggle("hidden",!calendarVisible);
      document.getElementById("topGrid").classList.toggle("calendar-visible",calendarVisible);
      document.getElementById("calendarToggleBtn").textContent=calendarVisible?"Hide Calendar":"Show Calendar";
      fitContainer();
    }

    function initModes(){
      const params=new URLSearchParams(location.search);
      DEV_MODE=params.get("dev")==="1"; BARE_MODE=params.get("b")==="1";
      if(BARE_MODE) document.body.classList.add("bare-mode");
    }

    function initDevPanelVisibility(){
      const devPanel=document.getElementById("devPanel"),themeRow=document.getElementById("themeRow");
      devPanel.style.display=DEV_MODE?"block":"none"; themeRow.style.display=DEV_MODE?"flex":"none";
      const input=document.getElementById("cycleSecondsInput"); if(input) input.value=String(BASE_CYCLE_MS/1000);
      const eff=document.getElementById("effectiveCycleSeconds"); if(eff) eff.textContent=`${(getEffectiveCycleMs()/1000).toFixed(2)}s`;
      fitContainer();
    }

    function fitContainer(){
      const c=document.getElementById("mainContainer");
      if(BARE_MODE){c.classList.remove("allow-scroll");c.style.maxHeight="none";return;}
      c.classList.remove("allow-scroll");
      const max=Math.floor(innerHeight*.94); c.style.maxHeight=`${max}px`;
      requestAnimationFrame(()=>{c.classList.toggle("allow-scroll", c.scrollHeight>c.clientHeight+1);});
    }

    initModes(); initDevPanelVisibility();
    applyTheme(cycleThemeKeys[Math.floor(Math.random() * cycleThemeKeys.length)]);
    update(); fitContainer();
    addEventListener("resize", fitContainer);
    setInterval(()=>{update(); updateDevInfo();},250);
    renderCalendar(); updateDevInfo();
  </script>
</body>
</html>
